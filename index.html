function toggleWordStrokes(el,hanzi){
  const existing=el.querySelector('.word-strokes');
  if(existing){existing.remove();expandedWord=null;return}
  document.querySelectorAll('.word-strokes').forEach(s=>s.remove());
  expandedWord=hanzi;
  const div=document.createElement('div');
  div.className='word-strokes';
  hwInstances=[];
  const chars=hanzi.split('');
  const targets=[];
  chars.forEach((ch,i)=>{
    const wrap=document.createElement('div');
    wrap.className='stroke-char';
    const svgDiv=document.createElement('div');
    targets.push({el:svgDiv,ch:ch});
    wrap.appendChild(svgDiv);
    const label=document.createElement('span');
    label.textContent=ch;
    wrap.appendChild(label);
    div.appendChild(wrap);
  });
  const playBtn=document.createElement('button');
  playBtn.className='stroke-play';
  playBtn.textContent='▶ Xem cách viết';
  playBtn.onclick=function(e){e.stopPropagation();hwInstances.forEach(function(w){w.animateCharacter()})};
  div.appendChild(playBtn);

  el.appendChild(div);
  setTimeout(function(){
    targets.forEach(function(t){
      if(typeof HanziWriter!=='undefined'){
        try{
          var w=HanziWriter.create(t.el,t.ch,{width:80,height:80,padding:5,strokeAnimationSpeed:1,delayBetweenStrokes:300,strokeColor:'#1A1A2E',radicalColor:'#D96B64',showOutline:true,showCharacter:false});
          hwInstances.push(w);
          w.animateCharacter();
        }catch(e){t.el.innerHTML='<span style="font-size:40px;font-family:Noto Sans SC">'+t.ch+'</span>'}
      }else{t.el.innerHTML='<span style="font-size:40px;font-family:Noto Sans SC">'+t.ch+'</span>'}
    });
  },100);
}

function speak(text){
  if('speechSynthesis' in window){
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='zh-CN';u.rate=0.8;
    const voices=window.speechSynthesis.getVoices();
    const zh=voices.find(v=>v.lang.startsWith('zh'));
    if(zh)u.voice=zh;
    window.speechSynthesis.speak(u);
  }
}
window.speechSynthesis&&window.speechSynthesis.getVoices();












function getHSK79Sets(){
  const sets=[];const sz=20;
  for(let i=0;i<HSK79_ALL.length;i+=sz){
    const id=Math.floor(i/sz)+1;
    sets.push({id,words:HSK79_ALL.slice(i,i+sz),start:i+1,end:Math.min(i+sz,HSK79_ALL.length)});
  }
  return sets;
}

function getWritingWordPool() {
  // Lấy danh sách hanzi từ cấp hiện tại và các cấp thấp hơn
  let pool = [];
  const lv = state.writingLevel || state.level;
  if (lv === 'hsk1' || lv === 'hsk2' || lv === 'hsk3' || lv === 'hsk4' || lv === 'hsk5' || lv === 'hsk6' || lv === 'hsk79') {
    if (lv === 'hsk1' || lv === 'hsk2' || lv === 'hsk3') {
      if (typeof HSK1_ALL !== 'undefined') pool = pool.concat(HSK1_ALL);
      if (typeof HSK2_ALL !== 'undefined' && (lv === 'hsk2' || lv === 'hsk3')) pool = pool.concat(HSK2_ALL);
      if (typeof HSK3_ALL !== 'undefined' && lv === 'hsk3') pool = pool.concat(HSK3_ALL);
    } else {
      if (typeof HSK1_ALL !== 'undefined') pool = pool.concat(HSK1_ALL);
      if (typeof HSK2_ALL !== 'undefined') pool = pool.concat(HSK2_ALL);
      if (typeof HSK3_ALL !== 'undefined') pool = pool.concat(HSK3_ALL);
      if (lv === 'hsk4' && typeof HSK4_ALL !== 'undefined') pool = pool.concat(HSK4_ALL);
      if (lv === 'hsk5' && typeof HSK5_ALL !== 'undefined') pool = pool.concat(HSK5_ALL);
      if (lv === 'hsk6' && typeof HSK6_ALL !== 'undefined') pool = pool.concat(HSK6_ALL);
      if (lv === 'hsk79' && typeof HSK79_ALL !== 'undefined') pool = pool.concat(HSK79_ALL);
    }
  }
  if (!pool.length) pool = HSK1_ALL || [];
  return pool;
}

function buildWritingPrompt(subMode) {
  const pool = getWritingWordPool();
  const hanziList = pool.map(w => w.hanzi || w.h).filter(Boolean).join(', ');
  const levelLabel = state.writingLevel || state.level || 'hsk1';

  if (subMode === 'short') {
    return `Bạn là giáo viên tiếng Trung. Hãy tạo ${Math.floor(Math.random()*4)+5} câu tiếng Trung ĐỘC LẬP (không liên quan đến nhau, mỗi câu một chủ đề khác nhau) cho học sinh trình độ ${levelLabel.toUpperCase()}.

DANH SÁCH TỪ VỰNG ĐƯỢC PHÉP SỬ DỤNG (CHỈ dùng chữ Hán trong danh sách này):
${hanziList}

QUY TẮC:

[

]`;
  } else {
    return `Bạn là giáo viên tiếng Trung. Hãy viết một BÀI VĂN DÀI LIỀN MẠCH bằng tiếng Trung cho học sinh trình độ ${levelLabel.toUpperCase()}.

[
  {"step":1,"vi":"Câu 1 tiếng Việt","zh":"Câu 1 tiếng Trung","pinyin":"Phiên âm"},
  ...
]`;
  }
}

async function callDeepSeekWriting(subMode) {
  console.log('callDeepSeekWriting called, subMode='+subMode, 'hasApiKey='+!!DEEPSEEK_API_KEY);
  if (!DEEPSEEK_API_KEY) {
    console.log('No API key, using local fallback');
    return generateLocalWritingData(subMode);
  }
  const prompt = buildWritingPrompt(subMode);
  console.log('Prompt length:', prompt.length);
  try {
    const resp = await fetch(DEEPSEEK_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_API_KEY },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: 'Bạn là trợ lý tạo nội dung học tiếng Trung. CHỈ trả về JSON hợp lệ, không markdown, không giải thích.' },
          { role: 'user', content: prompt }
        ],
        temperature: 0.8,
        max_tokens: 2000,
      })
    });
    console.log('DeepSeek response status:', resp.status);
    if (!resp.ok) {
      const errText = await resp.text();
      console.error('DeepSeek error body:', errText.substring(0,200));
      throw new Error('API lỗi: ' + resp.status);
    }
    const json = await resp.json();
    const content = json.choices[0].message.content.trim();
    console.log('Raw AI response:', content.substring(0,200));
    const clean = content.replace(/^```json\s*/, '').replace(/```$/, '').trim();
    console.log('Cleaned JSON:', clean.substring(0,200));
    const data = JSON.parse(clean);
    if (!Array.isArray(data)) throw new Error('AI không trả về mảng JSON hợp lệ');
    console.log('Parsed data, steps:', data.length);
    return data;
  } catch (e) {
    console.error('DeepSeek API error:', e.message, e);
    return generateLocalWritingData(subMode);
  }
}

function renderWriting(data, levelKey){
  if (levelKey) state.writingLevel = levelKey;
  if (!state.writingSubMode) state.writingSubMode = 'short';

  if (state.writingLoading) {
    return '<div class="writing-container fade-in"><div class="writing-loading"><div class="writing-spinner"></div><div class="writing-loading-text">'+icon('bot',24)+' AI đang tạo bài luyện viết...</div><div class="writing-loading-sub">Đang gọi DeepSeek API để sinh nội dung phù hợp với từ vựng của bạn</div></div></div>';
  }

  if (!state.writingData || !state.writingData.length) {
    return renderWritingSetup();
  }

  const dataArr = state.writingData;
  const total = dataArr.length;
  if (!state.writingUserInputs || typeof state.writingUserInputs !== 'object') state.writingUserInputs = {};
  const isShort = state.writingSubMode === 'short';
  const modeLabel = isShort ? 'Câu ngắn độc lập' : 'Bài văn dài liền mạch';
  const modeIcon = isShort ? icon('file-text',16) : icon('scroll-text',16);
  const allFilled = dataArr.every((d,i) => (state.writingUserInputs[i]||'').trim());

  // Render ALL inputs at once
  let inputsHtml = dataArr.map((d, i) => {
    const userText = state.writingUserInputs[i] || '';
    const segs = (state.writingAiFeedback && state.writingAiFeedback.sentences) ? state.writingAiFeedback.sentences.find(s => s.step === i+1) : null;
    const hasFeedback = state.writingAiFeedback && segs;
    return '<div class="writing-sentence-block">' +
      '<div class="writing-sentence-header">' +
        '<span class="writing-sentence-num">' + (i+1) + '</span>' +
        '<span class="writing-sentence-vi"><span class="writing-vi-tag">VI</span> ' + d.vi + '</span>' +
      '</div>' +
      (hasFeedback
        ? '<div class="writing-colored-input">' + renderColoredSegments(segs) + '</div>'
        : '<textarea class="writing-textarea" data-writing-input="' + i + '" placeholder="Nhập câu tiếng Trung..." rows="2">' + (userText || '') + '</textarea>'
      ) +
    '</div>';
  }).join('');

  // Feedback header
  let feedbackHtml = '';
  if (state.writingFeedbackLoading) {

async function callDeepSeekGrading(subMode, writingData, userInputs) {
  console.log('callDeepSeekGrading (batch) called, sentences:', writingData.length);
  if (!DEEPSEEK_API_KEY) {
    console.log('No API key, using local grading');
    return generateLocalGrading(writingData, userInputs);
  }
  // Build prompt with all sentences
  let sentencesBlock = writingData.map((d,i) => {
    const user = userInputs[i] || '';
    return `Câu ${i+1}:\n- Tiếng Việt: ${d.vi}\n- Đáp án mẫu: ${d.zh}\n- Học sinh viết: ${user}`;
  }).join('\n\n');

  const prompt = `Bạn là giáo viên tiếng Trung. Hãy chấm điểm TỪNG CÂU và phân tích THEO TỪNG KÝ TỰ/TỪ cho bài viết sau.

${sentencesBlock}

Với MỖI câu, hãy so sánh câu học sinh viết với đáp án mẫu, sau đó trả về các đoạn (segments) để tô màu:
- Mỗi ký tự hoặc từ đúng → correct: true
- Mỗi ký tự hoặc từ sai → correct: false, kèm "fix" (từ đúng) và "reason" (lý do ngắn bằng tiếng Việt)

TRẢ VỀ CHỈ MỘT OBJECT JSON (không markdown):
{
  "overall": "Nhận xét tổng quan 3-4 câu",
  "sentences": [
    {"step":1, "segments":[
      {"text":"我喜欢","correct":true},
      {"text":"狗","correct":false,"fix":"猫","reason":"Câu gốc nói về mèo, không phải chó"}
    ]},
    ...
  ]
}`;
  try {
    const resp = await fetch(DEEPSEEK_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_API_KEY },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: 'Bạn là giáo viên tiếng Trung. CHỈ trả về JSON hợp lệ, không markdown, không giải thích ngoài JSON.' },
          { role: 'user', content: prompt }
        ],
        temperature: 0.4,
        max_tokens: 2000,
      })
    });
    if (!resp.ok) throw new Error('API lỗi: ' + resp.status);
    const json = await resp.json();
    const content = json.choices[0].message.content.trim();
    const clean = content.replace(/^```json\s*/, '').replace(/```$/, '').trim();
    return JSON.parse(clean);
  } catch (e) {
    console.error('Batch grading error:', e);
    return generateLocalGrading(writingData, userInputs);
  }
}

function generateLocalGrading(writingData, userInputs) {
  const sentences = writingData.map((d, i) => {
    const user = (userInputs[i] || '').trim();
    const expected = d.zh.trim();
    if (!user) return { step: i+1, segments: [{ text: '_(chưa viết)_', correct: false, fix: expected, reason: 'Bạn chưa viết câu này' }] };
    if (user === expected) return { step: i+1, segments: [{ text: user, correct: true }] };
    // Simple diff: split into words and compare
    const segs = [];
    const userChars = [...user];
    const expChars = [...expected];
    const maxLen = Math.max(userChars.length, expChars.length);
    let currentText = '', currentCorrect = null;
    for (let j = 0; j < maxLen; j++) {
      const uc = userChars[j] || '';
      const ec = expChars[j] || '';
      const match = uc === ec;
      if (currentCorrect !== match && currentText) {
        segs.push({ text: currentText, correct: !!currentCorrect });
        currentText = '';
      }
      currentCorrect = match;
      currentText += uc || ec;
    }
    if (currentText) segs.push({ text: currentText, correct: !!currentCorrect });
    if (segs.length === 0) segs.push({ text: user, correct: user === expected });
    return { step: i+1, segments: segs };
  });
  return { overall: 'Chấm điểm tự động (không có AI): so sánh ký tự.', sentences };
}

function generateFillIn(){
  const pool=HSK1_ALL.filter(w=>w.ex&&w.ex.length>2);
  const words=shuffle(pool).slice(0,20);
  const all=HSK1_ALL;
  state.quizQuestions=words.map(w=>{
    let ex=w.ex;
    let idx=ex.indexOf('(');
    let cnPart=idx>0?ex.substring(0,idx).trim():ex;
    let viPart=idx>0?ex.substring(idx):'';
    let blank=cnPart.replace(w.hanzi,'______');
    if(blank===cnPart){
      let h=w.hanzi;
      for(let i=0;i<h.length;i++){
        let ch=h.charAt(i);
        if(cnPart.indexOf(ch)>=0){blank=cnPart.replace(ch,'__');break}
      }
    }
    let wr=shuffle(all.filter(x=>x.hanzi!==w.hanzi).map(x=>x.hanzi)).slice(0,3);
    let opts=shuffle([w.hanzi,...wr]);
    return{sentence:blank,hint:viPart||w.vi,ci:opts.indexOf(w.hanzi),options:opts,sel:-1};
  });
  state.quizIndex=0;state.quizScore=0;state.quizAnswered=false;state.quizDone=false;
}

function gen456Fill(s,d){
  const pool=s.words.filter(w=>w.ex&&w.ex.length>3);const all=d.all;

    let cn=idx>0?ex.substring(0,idx).trim():ex.split('；')[0].split(';')[0].split('/')[0].split(' / ')[0];
    let vi=idx>0?ex.substring(idx):w.vi;
    let blank=cn.replace(w.h,'______');
    if(blank===cn){for(let i=0;i<w.h.length;i++){let ch=w.h.charAt(i);if(cn.indexOf(ch)>=0){blank=cn.replace(ch,'__');break}}}
    let wr=shuffle(all.filter(x=>x.h!==w.h).map(x=>x.h)).slice(0,3);
    let opts=shuffle([w.h,...wr]);
    return{sentence:blank,hint:vi||w.vi,ci:opts.indexOf(w.h),options:opts,sel:-1};
  });
  state.quizIndex=0;state.quizScore=0;state.quizAnswered=false;state.quizDone=false;
}

function gen79Fill(s){
  const pool=s.words.filter(w=>w.ex&&w.ex.length>3);const all=HSK79_ALL;
  const words=shuffle(pool).slice(0,Math.min(20,pool.length));
  state.quizQuestions=words.map(w=>{
    let phrases=w.ex.split(/[；;]/).map(p=>p.trim()).filter(p=>p.length>1);
    let match=phrases.find(p=>p.indexOf(w.h)>=0)||phrases[0]||w.ex;
    let idx=match.indexOf('(');
    let cn=idx>0?match.substring(0,idx).trim():match;
    let vi=idx>0?match.substring(idx).trim():w.vi;
    let blank=cn.replace(w.h,'______');
    if(blank===cn){blank=cn.replace(new RegExp('['+w.h[0]+'][^，。！？ ]*'),'______')}
    let wr=shuffle(all.filter(x=>x.h!==w.h).map(x=>x.h)).slice(0,3);
    let opts=shuffle([w.h,...wr]);
    return{sentence:blank,hint:vi,ci:opts.indexOf(w.h),options:opts,sel:-1};
  });
  state.quizIndex=0;state.quizScore=0;state.quizAnswered=false;state.quizDone=false;
}

// Enrich lesson words with hv + ex from _ALL arrays
function enrichWord(w){
  if(w.hv&&w.ex)return w;
  var pool=(typeof HSK1_ALL!=='undefined'?HSK1_ALL:[]).concat(typeof HSK2_ALL!=='undefined'?HSK2_ALL:[]).concat(typeof HSK3_ALL!=='undefined'?HSK3_ALL:[]);
  var found=pool.find(function(x){return x.hanzi===w.hanzi||x.h===w.hanzi});
  if(found){w.hv=found.hv||'';w.ex=found.ex||''}
  return w;
}

function generateQuiz(lesson){
  const words=shuffle(lesson.words);
  const allW=getAllWords();
  state.quizQuestions=words.map(w=>{
    const isCnToVn=Math.random()<0.5;
    if(isCnToVn){
      let wr=shuffle(allW.filter(x=>x.vi!==w.vi).map(x=>x.vi)).slice(0,3);
      let opts=shuffle([w.vi,...wr]);
      return{hanzi:w.hanzi,pinyin:w.pinyin,ci:opts.indexOf(w.vi),options:opts,sel:-1,type:'cn2vn'};
    }else{
      let wr=shuffle(allW.filter(x=>x.hanzi!==w.hanzi).map(x=>x.hanzi)).slice(0,3);
      let opts=shuffle([w.hanzi,...wr]);
      return{hanzi:w.vi,pinyin:'Chọn từ tiếng Trung đúng',ci:opts.indexOf(w.hanzi),options:opts,sel:-1,type:'vn2cn'};
    }
  });
  state.quizIndex=0;state.quizScore=0;state.quizAnswered=false;state.quizDone=false;
}

function generateSRQuiz(words,mode){
  state.quizQuestions=words.map(function(w,i){
    if(mode==='fillin'&&w.ex&&w.ex.length>2){
      var ex=w.ex,idx=ex.indexOf('(');
      var cn=idx>0?ex.substring(0,idx).trim():ex.split('；')[0].split(';')[0];
      var blank=cn.replace(w.hanzi||w.h,'______');
      var wr=shuffle(words.filter(function(x){return(x.hanzi||x.h)!==(w.hanzi||w.h)}).map(function(x){return x.hanzi||x.h})).slice(0,3);
      var opts=shuffle([w.hanzi||w.h].concat(wr));
      return{sentence:blank,hint:w.vi,ci:opts.indexOf(w.hanzi||w.h),options:opts,sel:-1};
    }
    var isCn=Math.random()<0.5;
    if(isCn){
      var wr2=shuffle(words.filter(function(x){return x.vi!==w.vi}).map(function(x){return x.vi})).slice(0,3);
      var opts2=shuffle([w.vi].concat(wr2));
      return{prompt:w.hanzi||w.h,sub:w.pinyin||w.p,ci:opts2.indexOf(w.vi),options:opts2,sel:-1};
    }else{
      var wr3=shuffle(words.filter(function(x){return(x.hanzi||x.h)!==(w.hanzi||w.h)}).map(function(x){return x.hanzi||x.h})).slice(0,3);
      var opts3=shuffle([w.hanzi||w.h].concat(wr3));
      return{prompt:w.vi,sub:'Chọn từ tiếng Trung đúng',ci:opts3.indexOf(w.hanzi||w.h),options:opts3,sel:-1,isCn:true};
    }
  });
  state.quizIndex=0;state.quizScore=0;state.quizAnswered=false;state.quizDone=false;
}

function attachEvents(){
  // Bottom nav tabs
  document.querySelectorAll('[data-tab]').forEach(function(b){
    b.onclick=function(){
      state.tab=b.dataset.tab;
      if (state.tab==='learn' && state.view==='') state.view='home';
      render();
      window.scrollTo({top:0,behavior:'smooth'});
    };
  });
  // Locked level cards → trigger login or VIP upgrade
  document.querySelectorAll('.level-card.locked').forEach(function(c){
    var action = c.dataset.lockAction;
    c.onclick=function(){
      if(action==='login') sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin}});
      else alert('Tính năng này dành cho tài khoản VIP. Vui lòng nâng cấp!');
    };
  });
  // Dictionary search
  var ds=document.querySelector('[data-dict-search]');
  if(ds){ds.oninput=function(){state.dictSearch=this.value;render()};ds.focus()}
  // Dictionary expand groups
  document.querySelectorAll('[data-dict-expand]').forEach(function(b){
    b.onclick=function(){state._dictExpanded=state._dictExpanded===b.dataset.dictExpand?null:b.dataset.dictExpand;render()};
  });
  // Dictionary subtabs
  document.querySelectorAll('[data-dict-sub]').forEach(function(b){
    b.onclick=function(){state.dictSubtopic=b.dataset.dictSub;render()};
  });
  // Dictionary add-to-review buttons
  document.querySelectorAll('[data-dict-add]').forEach(function(b){
    b.onclick=function(e){e.stopPropagation();alert('Đã thêm "'+b.dataset.dictAdd+'" vào danh sách ôn tập! (tính năng đang phát triển)')};
  });
  // Review start button
  document.querySelectorAll('[data-action="review-start"]').forEach(function(b){
    b.onclick=function(){
      if (!state._reviewPool || !state._reviewPool.length) { alert('Không có từ nào để ôn tập!'); return; }
      var types = ['meaning','word','fillin'];
      var pick = types[Math.floor(Math.random()*types.length)];
      var words = shuffle(state._reviewPool).slice(0, 20);
      if (pick === 'meaning' || pick === 'word') {
        state.rQuizType = 'srs_'+pick;
        state.quizQuestions = words.map(function(w){
          var opts, ci;
          if (pick === 'meaning') {
            var wr = shuffle(words.filter(function(x){return x.vi!==w.vi}).map(function(x){return x.vi})).slice(0,3);
            opts = shuffle([w.vi].concat(wr));
            ci = opts.indexOf(w.vi);
            return {prompt:w.hanzi||w.h, sub:w.pinyin||w.p, ci:ci, options:opts, sel:-1};
          } else {
            var wr2 = shuffle(words.filter(function(x){return (x.hanzi||x.h)!==(w.hanzi||w.h)}).map(function(x){return x.hanzi||x.h})).slice(0,3);
            opts = shuffle([w.hanzi||w.h].concat(wr2));
            ci = opts.indexOf(w.hanzi||w.h);
            return {prompt:w.vi, sub:'Chọn từ tiếng Trung đúng', ci:ci, options:opts, sel:-1, isCn:true};
          }
        });
      } else {
        state.rQuizType = 'srs_fillin';
        state.quizQuestions = words.filter(function(w){return w.ex&&w.ex.length>2}).map(function(w){
          var ex = w.ex, idx = ex.indexOf('(');
          var cn = idx>0 ? ex.substring(0,idx).trim() : ex.split('；')[0].split(';')[0];
          var vi = idx>0 ? ex.substring(idx) : w.vi;
          var blank = cn.replace(w.hanzi||w.h, '______');
          var wr = shuffle(words.filter(function(x){return (x.hanzi||x.h)!==(w.hanzi||w.h)}).map(function(x){return x.hanzi||x.h})).slice(0,3);
          var opts = shuffle([w.hanzi||w.h].concat(wr));
          return {sentence:blank, hint:vi||w.vi, ci:opts.indexOf(w.hanzi||w.h), options:opts, sel:-1};
        });
      }
      state.quizIndex=0; state.quizScore=0; state.quizAnswered=false; state.quizDone=false;
      state._reviewMode = pick;
      render();
    };
  });
  // Legacy nav buttons
  document.querySelectorAll('[data-nav]').forEach(b=>{b.onclick=()=>{if(b.dataset.nav==='home'){state.view='home'}else if(b.dataset.nav==='level'){state.view='level';state.level=b.dataset.lv}render();window.scrollTo({top:0,behavior:'smooth'})}});
  document.querySelectorAll('[data-lesson]').forEach(c=>{c.onclick=()=>{const lv=c.dataset.lv;if(lv)state.level=lv;state.view='lesson';state.lessonId=parseInt(c.dataset.lesson);state.mode='flashcard';state.fcShuffled=[];state.quizQuestions=[];render();window.scrollTo({top:0,behavior:'smooth'})}});
  // Lesson module cards (sequential flow)
  document.querySelectorAll('[data-lesson-module]').forEach(function(c){
    c.onclick=function(){
      var mod = c.dataset.lessonModule;
      state.mode = mod;
      state.fcShuffled = [];
      state.quizQuestions = [];
      if (mod === 'meaning' || mod === 'word') state.mode = mod;
      render();
      window.scrollTo({top:0,behavior:'smooth'});
    };
  });
  // Lesson quiz restart
  document.querySelectorAll('[data-action="quiz-restart-lesson"]').forEach(function(b){
    b.onclick=function(){state.quizQuestions=[];state.quizDone=false;render()};
  });
  // Flashcard learn/unlearn buttons
  document.querySelectorAll('[data-action="mark-learned"]').forEach(function(b){
    b.onclick=function(e){e.stopPropagation();var w=state.fcShuffled[state.fcIndex];if(w){markLearned(w.hanzi);render()}};
  });
  document.querySelectorAll('[data-action="mark-unlearned"]').forEach(function(b){
    b.onclick=function(e){e.stopPropagation();var w=state.fcShuffled[state.fcIndex];if(w){markUnlearned(w.hanzi);render()}};
  });
  // Toggle stroke animation
  document.querySelectorAll('[data-action="toggle-stroke"]').forEach(function(b){
    b.onclick=function(e){e.stopPropagation();var el=document.getElementById('fc-stroke-area');if(!el)return;if(el.style.display==='none'){el.style.display='block';var w=state.fcShuffled[state.fcIndex];if(w&&el.children.length===0&&typeof HanziWriter!=='undefined'){HanziWriter.create(el,w.hanzi,{width:280,height:280,padding:20,strokeAnimationSpeed:1,delayBetweenStrokes:300,strokeColor:'#2563EB',radicalColor:'#F97316',showOutline:true,showCharacter:false}).animateCharacter()}}else{el.style.display='none'}};
  });
  // Review mode & level selection
  document.querySelectorAll('[data-review-lv]').forEach(function(b){
    b.onclick=function(){state._reviewLevel=b.dataset.reviewLv;render()};
  });
  document.querySelectorAll('[data-review-mode]').forEach(function(b){
    b.onclick=function(){state._reviewMode=b.dataset.reviewMode;render()};
  });
  // Review start
  document.querySelectorAll('[data-action="review-start"]').forEach(function(b){
    b.onclick=function(){
      var pool=[];
      if(state._reviewLevel==='hsk1'&&typeof HSK1_ALL!=='undefined')pool=HSK1_ALL;
      else if(state._reviewLevel==='hsk2'&&typeof HSK2_ALL!=='undefined')pool=HSK2_ALL;
      else if(state._reviewLevel==='hsk3'&&typeof HSK3_ALL!=='undefined')pool=HSK3_ALL;
      if(!pool.length)return;
      var words=shuffle(pool).slice(0,20);
      if(state._reviewMode==='flashcard'){state.fcShuffled=words;state.fcIndex=0;state.fcFlipped=false;state.mode='flashcard'}
      else{generateSRQuiz(words,state._reviewMode)}
      render();
    };
  });
  // ═══ GENERIC HANDLER (all data-action, including auth) ═══
  document.querySelectorAll('[data-action]').forEach(b=>{b.onclick=(e)=>{e.stopPropagation();const a=b.dataset.action;if(a==='login'){sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin}});return}if(a==='logout'){sb.auth.signOut();state.isLoggedIn=false;state.user=null;state.showUserMenu=false;render();return}if(a==='toggle-user-menu'){state.showUserMenu=!state.showUserMenu;render();return}if(a==='profile'){state.tab='profile';state.showUserMenu=false;render();return}if(a==='back'){state.view='level';render()}if(a==='flip'){state.fcFlipped=!state.fcFlipped;render()}if(a==='fc-prev'){state.fcIndex--;state.fcFlipped=false;render()}if(a==='fc-next'){state.fcIndex++;state.fcFlipped=false;render()}if(a==='fc-shuffle'){const l=getLessons().find(x=>x.id===state.lessonId);state.fcShuffled=shuffle(l.words);state.fcIndex=0;state.fcFlipped=false;render()}if(a==='quiz-restart'){const l=getLessons().find(x=>x.id===state.lessonId);generateQuiz(l);render()}}});
  document.querySelectorAll('[data-mode]').forEach(b=>{b.onclick=()=>{state.mode=b.dataset.mode;if(state.mode==='flashcard')state.fcShuffled=[];if(state.mode==='quiz')state.quizQuestions=[];render()}});
  document.querySelectorAll('[data-hsk79set]').forEach(c=>{c.onclick=()=>{state.view='hsk79set';state.lessonId=parseInt(c.dataset.hsk79set);state.mode='list';state.fcShuffled=[];state.quizQuestions=[];render();window.scrollTo({top:0,behavior:'smooth'})}});
  document.querySelectorAll('[data-m79]').forEach(b=>{b.onclick=()=>{state.mode=b.dataset.m79;state.fcShuffled=[];state.quizQuestions=[];render()}});
  document.querySelectorAll('[data-action="back-hsk79"]').forEach(b=>{b.onclick=()=>{state.view='level';state.level='hsk79';render()}});
  document.querySelectorAll('[data-action="fc-shuffle-79"]').forEach(b=>{b.onclick=(e)=>{e.stopPropagation();const s=getHSK79Sets().find(x=>x.id===state.lessonId);state.fcShuffled=shuffle(s.words);state.fcIndex=0;state.fcFlipped=false;render()}});
  document.querySelectorAll('[data-action="quiz-restart-79"]').forEach(b=>{b.onclick=()=>{const s=getHSK79Sets().find(x=>x.id===state.lessonId);if(state.rQuizType.startsWith('79f_'))gen79Fill(s);else{let t=state.mode;gen79Quiz(s,t)}render()}});
  document.querySelectorAll('[data-action="quiz-restart-srs"]').forEach(b=>{b.onclick=()=>{state._reviewMode=null;state.quizQuestions=[];render()}});
  document.querySelectorAll('[data-action="open-grammarAdv"]').forEach(b=>{b.onclick=()=>{state.view='grammarAdv';state.level=b.dataset.glv;render();window.scrollTo({top:0,behavior:'smooth'})}});
  document.querySelectorAll('[data-action="back-grammarAdv"]').forEach(b=>{b.onclick=()=>{state.view='level';render()}});
  document.querySelectorAll('[data-hsk456set]').forEach(c=>{c.onclick=()=>{if(c.dataset.navLv)state.level=c.dataset.navLv;state.view='hsk456set';state.lessonId=parseInt(c.dataset.hsk456set);state.mode='list';state.fcShuffled=[];state.quizQuestions=[];render();window.scrollTo({top:0,behavior:'smooth'})}});
  document.querySelectorAll('[data-m456]').forEach(b=>{b.onclick=()=>{state.mode=b.dataset.m456;state.fcShuffled=[];state.quizQuestions=[];render()}});
  document.querySelectorAll('[data-action="back-456"]').forEach(b=>{b.onclick=()=>{state.view='level';render()}});
  document.querySelectorAll('[data-action="fc-shuffle-456"]').forEach(b=>{b.onclick=(e)=>{e.stopPropagation();const s=getHSK456Sets().find(x=>x.id===state.lessonId);state.fcShuffled=shuffle(s.words);state.fcIndex=0;state.fcFlipped=false;render()}});
  document.querySelectorAll('[data-action="quiz-restart-456"]').forEach(b=>{b.onclick=()=>{const d=getHSK456Data();const s=getHSK456Sets().find(x=>x.id===state.lessonId);if(state.rQuizType.startsWith('456_f'))gen456Fill(s,d);else gen456Quiz(s,d);render()}});
  document.querySelectorAll('[data-grammar-lesson]').forEach(c=>{c.onclick=()=>{state.lessonId=parseInt(c.dataset.grammarLesson);state.mode='list';state.fcShuffled=[];state.quizQuestions=[];render();window.scrollTo({top:0,behavior:'smooth'})}});
  document.querySelectorAll('[data-action="back-grammar-lesson"]').forEach(b=>{b.onclick=()=>{state.lessonId=null;render()}});
  document.querySelectorAll('[data-action="open-grammar"]').forEach(b=>{b.onclick=()=>{state.view='grammar';state.level=b.dataset.glv;state.lessonId=null;state.mode='list';state.fcShuffled=[];state.quizQuestions=[];render();window.scrollTo({top:0,behavior:'smooth'})}});
  document.querySelectorAll('[data-action="open-grammar-all"]').forEach(b=>{b.onclick=()=>{state.view='grammarAll';state.mode='list';state.fcShuffled=[];state.quizQuestions=[];render();window.scrollTo({top:0,behavior:'smooth'})}});
  document.querySelectorAll('[data-action="back-grammar"]').forEach(b=>{b.onclick=()=>{state.view='level';render();window.scrollTo({top:0})}});
  document.querySelectorAll('[data-action="back-grammar-all"]').forEach(b=>{b.onclick=()=>{state.view='home';render();window.scrollTo({top:0})}});
  document.querySelectorAll('[data-mgr]').forEach(b=>{b.onclick=()=>{state.mode=b.dataset.mgr;state.fcShuffled=[];state.quizQuestions=[];render()}});
  document.querySelectorAll('[data-action="fc-shuffle-gr"]').forEach(b=>{b.onclick=(e)=>{e.stopPropagation();const g=getGrammarData();var pts=state.lessonId?g.data[state.lessonId]:Object.values(g.data).flat();state.fcShuffled=shuffle(pts);state.fcIndex=0;state.fcFlipped=false;render()}});
  document.querySelectorAll('[data-action="quiz-restart-gr"]').forEach(b=>{b.onclick=()=>{const g=getGrammarData();var pts=state.lessonId?g.data[state.lessonId]:Object.values(g.data).flat();genGrQuiz({data:pts,num:g.num,color:g.color});render()}});
  document.querySelectorAll('[data-rmode3]').forEach(b=>{b.onclick=()=>{state.rMode=b.dataset.rmode3;state.fcShuffled=[];state.quizQuestions=[];render()}});
  document.querySelectorAll('[data-action="open-review3"]').forEach(b=>{b.onclick=()=>{state.view='review3';state.rMode='list';state.fcShuffled=[];state.quizQuestions=[];render();window.scrollTo({top:0,behavior:'smooth'})}});
  document.querySelectorAll('[data-action="back-review3"]').forEach(b=>{b.onclick=()=>{state.view='level';state.level='hsk3';render()}});
  document.querySelectorAll('[data-action="fc-shuffle-r3"]').forEach(b=>{b.onclick=(e)=>{e.stopPropagation();state.fcShuffled=shuffle(HSK3_ALL);state.fcIndex=0;state.fcFlipped=false;render()}});
  document.querySelectorAll('[data-action="quiz-restart-r3"]').forEach(b=>{b.onclick=()=>{if(state.rQuizType==='r3_fillin')genR3Fill();else{let t=state.rQuizType.replace('r3_','');genR3Quiz(t)}render()}});
  document.querySelectorAll('[data-rmode2]').forEach(b=>{b.onclick=()=>{state.rMode=b.dataset.rmode2;state.fcShuffled=[];state.quizQuestions=[];render()}});
  document.querySelectorAll('[data-action="open-review2"]').forEach(b=>{b.onclick=()=>{state.view='review2';state.rMode='list';state.fcShuffled=[];state.quizQuestions=[];render();window.scrollTo({top:0,behavior:'smooth'})}});
  document.querySelectorAll('[data-action="back-review2"]').forEach(b=>{b.onclick=()=>{state.view='level';state.level='hsk2';render()}});
  document.querySelectorAll('[data-action="fc-shuffle-r2"]').forEach(b=>{b.onclick=(e)=>{e.stopPropagation();state.fcShuffled=shuffle(HSK2_ALL);state.fcIndex=0;state.fcFlipped=false;render()}});
  document.querySelectorAll('[data-action="quiz-restart-r2"]').forEach(b=>{b.onclick=()=>{if(state.rQuizType==='r2_fillin')genR2FillIn();else{let t=state.rQuizType.replace('r2_','');genR2Quiz(t)}render()}});
  document.querySelectorAll('[data-rmode]').forEach(b=>{b.onclick=()=>{state.rMode=b.dataset.rmode;state.fcShuffled=[];state.quizQuestions=[];render()}});
  document.querySelectorAll('[data-action="open-review"]').forEach(b=>{b.onclick=()=>{state.view='review';state.rMode='list';state.fcShuffled=[];state.quizQuestions=[];render();window.scrollTo({top:0,behavior:'smooth'})}});
  document.querySelectorAll('[data-action="back-review"]').forEach(b=>{b.onclick=()=>{state.view='level';state.level='hsk1';render()}});
  document.querySelectorAll('[data-action="fc-shuffle-review"]').forEach(b=>{b.onclick=(e)=>{e.stopPropagation();state.fcShuffled=shuffle(HSK1_ALL);state.fcIndex=0;state.fcFlipped=false;render()}});
  document.querySelectorAll('[data-action="quiz-restart-review"]').forEach(b=>{b.onclick=()=>{generateReviewQuiz(state.rQuizType);render()}});
  // Writing mode events
  document.querySelectorAll('[data-action="writing-back-setup"]').forEach(b=>{b.onclick=()=>{state.writingData=null;state.writingUserInputs={};state.writingSubmitted=false;state.writingAiFeedback=null;state.writingError=null;render()}});
  document.querySelectorAll('[data-action="writing-reset"]').forEach(b=>{b.onclick=()=>{state.writingUserInputs={};state.writingSubmitted=false;state.writingAiFeedback=null;render()}});
  document.querySelectorAll('[data-action="writing-generate"]').forEach(b=>{b.onclick=async()=>{try{await generateWriting();render()}catch(e){console.error(e);state.writingLoading=false;render()}}});
  document.querySelectorAll('[data-action="writing-regenerate"]').forEach(b=>{b.onclick=async()=>{state.writingData=null;state.writingUserInputs={};state.writingSubmitted=false;state.writingAiFeedback=null;try{await generateWriting();render()}catch(e){console.error(e);state.writingLoading=false;render()}}});
  document.querySelectorAll('[data-action="writing-submit-all"]').forEach(b=>{b.onclick=async()=>{
    try {
      saveAllWritingInputs();
      if(!state.writingData) return;
      state.writingFeedbackLoading = true;
      state.writingSubmitted = true;
      render();
      const feedback = await callDeepSeekGrading(state.writingSubMode, state.writingData, state.writingUserInputs);
      state.writingAiFeedback = feedback;
      state.writingFeedbackLoading = false;
      render();
    } catch(e) {
      console.error('submit-all error:', e);
      state.writingFeedbackLoading = false;
      state.writingError = 'Lỗi chấm bài: ' + (e.message||'');
      render();
    }
  }});
  document.querySelectorAll('[data-wsmode]').forEach(b=>{b.onclick=()=>{state.writingSubMode=b.dataset.wsmode;render()}});
  document.querySelectorAll('.writing-mode-card').forEach(b=>{b.onclick=function(){const r=this.querySelector('input[type=radio]');if(r){r.checked=true;state.writingSubMode=r.value;render()}}});
  // Lưu input + cập nhật nút submit
  document.querySelectorAll('[data-writing-input]').forEach(ta=>{
    ta.addEventListener('input', function(){
      const idx = parseInt(this.dataset.writingInput);
      if(!isNaN(idx)){if(!state.writingUserInputs)state.writingUserInputs={};state.writingUserInputs[idx]=this.value}
      // Update submit button state
      const allInputs = document.querySelectorAll('[data-writing-input]');
      const allFilled = Array.from(allInputs).every(t => t.value.trim());
      const submitBtn = document.querySelector('[data-action="writing-submit-all"]');
      if(submitBtn) submitBtn.disabled = !allFilled;
    });
  });
  document.querySelectorAll('.word-item').forEach(el=>{
    el.addEventListener('click',function(e){
      if(e.target.closest('.audio-btn')||e.target.closest('.stroke-play'))return;
      const hanzi=el.querySelector('.word-hanzi');
      if(hanzi)toggleWordStrokes(el,hanzi.textContent.trim());
    });
  });
  document.querySelectorAll('[data-speak]').forEach(b=>{b.onclick=(e)=>{e.stopPropagation();speak(b.dataset.speak)}});
  document.querySelectorAll('[data-quiz-opt]').forEach(b=>{b.onclick=()=>{if(state.quizAnswered)return;const i=parseInt(b.dataset.quizOpt);const q=state.quizQuestions[state.quizIndex];q.sel=i;state.quizAnswered=true;if(i===q.ci)state.quizScore++;render();setTimeout(()=>{if(state.quizIndex<state.quizQuestions.length-1){state.quizIndex++;state.quizAnswered=false;render()}else{state.quizDone=true;render()}},1200)}});
}

document.addEventListener('keydown',function(e){
  if(state.mode==='flashcard'||(state.view==='review'&&state.rMode==='flashcard')||(state.view==='review2'&&state.rMode==='flashcard')||(state.view==='review3'&&state.rMode==='flashcard')||(state.view==='grammar'&&state.mode==='flashcard')||(state.view==='hsk79set'&&state.mode==='flashcard')||(state.view==='hsk456set'&&state.mode==='flashcard')){
    if(e.code==='Space'||e.code==='ArrowUp'||e.code==='ArrowDown'){e.preventDefault();state.fcFlipped=!state.fcFlipped;render()}
    if(e.code==='ArrowRight'){e.preventDefault();if(state.fcIndex<state.fcShuffled.length-1){state.fcIndex++;state.fcFlipped=false;render()}}
    if(e.code==='ArrowLeft'){e.preventDefault();if(state.fcIndex>0){state.fcIndex--;state.fcFlipped=false;render()}}
    if(e.code==='KeyS'||e.code==='KeyR'){e.preventDefault();if(state.fcShuffled.length)speak(state.fcShuffled[state.fcIndex].hanzi)}
  }
});
render();
// ═══ Supabase Auth: check session on load ═══
sb.auth.onAuthStateChange((event,session)=>{if(session?.user){state.isLoggedIn=true;state.user=session.user;render()}});
// Check existing session
sb.auth.getSession().then(({data})=>{if(data.session){state.isLoggedIn=true;state.user=data.session.user;render()}});
</script>
<script type="module" src="/src/main.js"></script></body></html>
