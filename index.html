<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meiday Chinese — HSK 3.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;700&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#C0392B;--red-light:#E74C3C;--red-dark:#922B21;--gold:#D4A017;--gold-light:#F0D060;--cream:#FFF8F0;--ink:#1A1A2E;--ink-light:#3D3D5C;--paper:#FFFDF7;--border:#E8DFD0;--green:#27AE60;--orange:#E67E22;--shadow:0 2px 20px rgba(26,26,46,0.08);--shadow-lg:0 8px 40px rgba(26,26,46,0.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;overflow-x:hidden}
.header{background:linear-gradient(135deg,var(--red-dark) 0%,var(--red) 50%,var(--red-light) 100%);position:sticky;top:0;z-index:100;box-shadow:0 4px 30px rgba(192,57,43,0.3)}
.header-inner{max-width:960px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;background:var(--gold);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif SC',serif;font-size:22px;font-weight:700;color:var(--red-dark);box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.logo-text{color:white;font-size:20px;font-weight:700;letter-spacing:-0.5px}
.logo-sub{color:rgba(255,255,255,0.7);font-size:11px;font-weight:400}
.level-tabs{display:flex;gap:6px}


.header-badge{background:rgba(255,255,255,0.15);color:white;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;backdrop-filter:blur(10px)}
.nav{background:white;border-bottom:1px solid var(--border);box-shadow:var(--shadow);position:sticky;top:68px;z-index:99}
.nav-inner{max-width:960px;margin:0 auto;display:flex;gap:4px;padding:10px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav-inner::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;padding:8px 16px;border:none;border-radius:20px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;background:transparent;color:var(--ink-light);white-space:nowrap}
.nav-btn:hover{background:#f5f0e8}
.nav-btn.active{background:var(--red);color:white;box-shadow:0 2px 10px rgba(192,57,43,0.3)}
.main{max-width:960px;margin:0 auto;padding:24px 16px 100px}
.home-hero{text-align:center;padding:40px 20px 32px}
.home-hero h1{font-family:'Noto Serif SC',serif;font-size:40px;font-weight:700;color:var(--red);margin-bottom:6px}
.home-hero p{font-size:15px;color:var(--ink-light);max-width:520px;margin:0 auto 24px;line-height:1.6}
.stats-row{display:flex;justify-content:center;gap:30px;margin-bottom:32px}
.stat{text-align:center}
.stat-num{font-size:30px;font-weight:700;color:var(--red);font-family:'Noto Serif SC',serif}
.stat-label{font-size:12px;color:var(--ink-light);margin-top:2px}
.section-title{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:700;color:var(--ink);margin:28px 0 14px;padding-left:14px;border-left:4px solid var(--red);display:flex;align-items:center;gap:10px}
.section-title .badge{font-size:12px;padding:3px 12px;border-radius:12px;font-family:'Be Vietnam Pro',sans-serif;font-weight:600;color:white}
.badge-hsk1{background:var(--red)}
.badge-hsk2{background:var(--orange)}
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;margin-bottom:12px}
.lesson-card{background:white;border:1px solid var(--border);border-radius:14px;padding:18px 20px;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden}
.lesson-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--red);opacity:0;transition:opacity 0.25s}
.lesson-card.hsk2::before{background:var(--orange)}
.lesson-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--red)}
.lesson-card.hsk2:hover{border-color:var(--orange)}
.lesson-card:hover::before{opacity:1}
.lesson-num{font-family:'Noto Serif SC',serif;font-size:12px;font-weight:700;color:var(--red);margin-bottom:4px}
.lesson-card.hsk2 .lesson-num{color:var(--orange)}
.lesson-title-cn{font-family:'Noto Sans SC',sans-serif;font-size:20px;font-weight:700;color:var(--ink);margin-bottom:2px}
.lesson-title-vi{font-size:13px;color:var(--ink-light);margin-bottom:8px}
.lesson-meta{display:flex;gap:8px}
.lesson-tag{font-size:11px;padding:3px 10px;border-radius:10px;background:#FFF0E6;color:var(--red);font-weight:500}
.lesson-card.hsk2 .lesson-tag{background:#FFF3E6;color:var(--orange)}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-size:14px;color:var(--ink-light);background:none;border:none;cursor:pointer;margin-bottom:14px;padding:6px 0}
.back-btn:hover{color:var(--red)}
.lesson-view-title{font-family:'Noto Serif SC',serif;font-size:30px;font-weight:700;color:var(--ink)}
.lesson-view-sub{font-size:14px;color:var(--ink-light);margin-top:4px;margin-bottom:20px}
.mode-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.mode-tab{padding:10px 22px;border:2px solid var(--border);border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;background:white;color:var(--ink-light)}
.mode-tab:hover{border-color:var(--red);color:var(--red)}
.mode-tab.active{border-color:var(--red);background:var(--red);color:white}
.word-list{display:flex;flex-direction:column;gap:7px}
.word-item{background:white;border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:grid;grid-template-columns:auto auto 1fr auto;gap:14px;align-items:center;transition:all 0.2s}
.word-item:hover{border-color:var(--gold);box-shadow:var(--shadow)}
.word-hanzi{font-family:'Noto Sans SC',sans-serif;font-size:26px;font-weight:700;color:var(--ink);min-width:60px}
.word-info{min-width:0}
.word-pinyin{font-size:14px;color:var(--red);font-weight:500;margin-bottom:1px}
.word-meaning{font-size:13px;color:var(--ink-light);line-height:1.4}
.word-pos{font-size:11px;padding:3px 10px;border-radius:8px;background:#f0ebe3;color:var(--ink-light);font-weight:500;white-space:nowrap}
.flashcard-container{display:flex;flex-direction:column;align-items:center;padding:16px 0}
.flashcard-progress{font-size:14px;color:var(--ink-light);margin-bottom:18px}
.flashcard{width:100%;max-width:400px;min-height:300px;perspective:1000px;cursor:pointer;margin-bottom:22px}
.flashcard-inner{position:relative;width:100%;height:100%;min-height:300px;transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);transform-style:preserve-3d}
.flashcard-inner.flipped{transform:rotateY(180deg)}
.flashcard-front,.flashcard-back{position:absolute;width:100%;height:100%;min-height:300px;backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 28px;text-align:center}
.flashcard-front{background:linear-gradient(145deg,white 0%,#FFF8F0 100%);border:2px solid var(--border);box-shadow:var(--shadow-lg)}
.flashcard-back{background:linear-gradient(145deg,var(--red) 0%,var(--red-dark) 100%);transform:rotateY(180deg);color:white;box-shadow:0 8px 40px rgba(192,57,43,0.3)}
.fc-hanzi{font-family:'Noto Serif SC',serif;font-size:68px;font-weight:700;color:var(--ink);margin-bottom:10px;line-height:1.1}
.fc-hint{font-size:13px;color:var(--ink-light);opacity:0.5;margin-top:14px}
.fc-pinyin{font-size:26px;font-weight:600;margin-bottom:14px;color:rgba(255,255,255,0.95)}
.fc-meaning{font-size:18px;line-height:1.5;color:rgba(255,255,255,0.85)}
.fc-controls{display:flex;gap:10px}
.fc-btn{padding:11px 26px;border:none;border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
.fc-btn.prev{background:white;color:var(--ink);border:2px solid var(--border)}
.fc-btn.prev:hover{border-color:var(--red);color:var(--red)}
.fc-btn.next{background:var(--red);color:white}
.fc-btn.next:hover{background:var(--red-dark)}
.fc-btn:disabled{opacity:0.3;cursor:not-allowed}
.shuffle-btn{padding:8px 14px;background:white;border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;color:var(--ink-light);transition:all 0.2s}
.shuffle-btn:hover{border-color:var(--gold);color:var(--gold)}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.word-count{font-size:13px;color:var(--ink-light);margin-left:auto}
.quiz-container{max-width:560px;margin:0 auto;padding:16px 0}
.quiz-progress-bar{width:100%;height:6px;background:var(--border);border-radius:3px;margin-bottom:22px;overflow:hidden}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:3px;transition:width 0.4s ease}
.quiz-question{text-align:center;margin-bottom:28px}
.quiz-q-label{font-size:13px;color:var(--ink-light);margin-bottom:10px}
.quiz-q-hanzi{font-family:'Noto Serif SC',serif;font-size:52px;font-weight:700;color:var(--ink);margin-bottom:4px}
.quiz-q-pinyin{font-size:17px;color:var(--red);font-weight:500}
.quiz-options{display:flex;flex-direction:column;gap:9px}
.quiz-option{width:100%;padding:14px 18px;background:white;border:2px solid var(--border);border-radius:14px;font-family:inherit;font-size:15px;color:var(--ink);cursor:pointer;transition:all 0.2s;text-align:left}
.quiz-option:hover:not(.correct):not(.wrong){border-color:var(--red);background:#FFF5F3}
.quiz-option.correct{border-color:var(--green);background:#E8F8F0;color:var(--green);font-weight:600}
.quiz-option.wrong{border-color:#E74C3C;background:#FFF0EE;color:#E74C3C}
.quiz-result{text-align:center;padding:36px 20px}
.quiz-score{font-family:'Noto Serif SC',serif;font-size:60px;font-weight:700;color:var(--red)}
.quiz-score-label{font-size:15px;color:var(--ink-light);margin-bottom:22px}
.quiz-restart{padding:13px 34px;background:var(--red);color:white;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer}
.quiz-restart:hover{background:var(--red-dark)}
.review-card{border:2px dashed var(--gold) !important;background:linear-gradient(135deg,#FFFDF0,#FFF8E8) !important}
.review-card:hover{border-color:var(--gold) !important;box-shadow:0 8px 30px rgba(212,160,23,0.2) !important}
.review-card::before{background:var(--gold) !important}
.audio-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:4px 8px;border-radius:8px;transition:all 0.15s;opacity:0.5;flex-shrink:0}
.audio-btn:hover{opacity:1;background:rgba(192,57,43,0.08);transform:scale(1.15)}
.audio-btn:active{transform:scale(0.95)}
.lesson-card.hsk79{border-left:3px solid #8E44AD}
.lesson-card.hsk79:hover{border-color:#8E44AD}
.lesson-card.hsk79 .lesson-tag{background:#F3E8FF;color:#8E44AD}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease forwards}
@media(max-width:600px){.lesson-grid{grid-template-columns:1fr}.fc-hanzi{font-size:52px}.quiz-q-hanzi{font-size:40px}.stats-row{gap:14px}.stat-num{font-size:22px}.home-hero h1{font-size:30px}.word-item{grid-template-columns:auto auto 1fr}.word-pos{display:none}.level-tabs{gap:4px}.level-tab{padding:6px 12px;font-size:12px}}
</style>
</head>

<div id="app"></div>

function speak(text){
  if('speechSynthesis' in window){
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='zh-CN';u.rate=0.8;
    const voices=window.speechSynthesis.getVoices();
    const zh=voices.find(v=>v.lang.startsWith('zh'));
    if(zh)u.voice=zh;
    window.speechSynthesis.speak(u);
  }
}
window.speechSynthesis&&window.speechSynthesis.getVoices();

function getHSK79Sets(){
  const sets=[];const sz=20;
  for(let i=0;i<HSK79_ALL.length;i+=sz){
    const id=Math.floor(i/sz)+1;
    sets.push({id,words:HSK79_ALL.slice(i,i+sz),start:i+1,end:Math.min(i+sz,HSK79_ALL.length)});
  }
  return sets;
}

function generateFillIn(){
  const pool=HSK1_ALL.filter(w=>w.ex&&w.ex.length>2);
  const words=shuffle(pool).slice(0,20);
  const all=HSK1_ALL;
  state.quizQuestions=words.map(w=>{
    let ex=w.ex;
    let idx=ex.indexOf('(');
    let cnPart=idx>0?ex.substring(0,idx).trim():ex;
    let viPart=idx>0?ex.substring(idx):'';
    let blank=cnPart.replace(w.hanzi,'______');
    if(blank===cnPart){
      let h=w.hanzi;
      for(let i=0;i<h.length;i++){
        let ch=h.charAt(i);
        if(cnPart.indexOf(ch)>=0){blank=cnPart.replace(ch,'__');break}
      }
    }
    let wr=shuffle(all.filter(x=>x.hanzi!==w.hanzi).map(x=>x.hanzi)).slice(0,3);
    let opts=shuffle([w.hanzi,...wr]);
    return{sentence:blank,hint:viPart||w.vi,ci:opts.indexOf(w.hanzi),options:opts,sel:-1};
  });
  state.quizIndex=0;state.quizScore=0;state.quizAnswered=false;state.quizDone=false;
}

  const q=state.quizQuestions[state.quizIndex],pr=(state.quizIndex/state.quizQuestions.length)*100;
  let optHtml=q.options.map((o,i)=>{let c='';if(state.quizAnswered){if(i===q.ci)c='correct';else if(i===q.sel)c='wrong'}return '<button class="quiz-option '+c+'" data-quiz-opt="'+i+'" '+(state.quizAnswered?'disabled':'')+' style="'+(q.isCn?'font-family:Noto Sans SC,sans-serif;font-size:20px':'')+'">'+o+'</button>'}).join('');
  return '<div class="quiz-container fade-in"><div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:'+pr+'%"></div></div><div class="quiz-question"><div class="quiz-q-label">Câu '+(state.quizIndex+1)+'/'+state.quizQuestions.length+'</div><div class="quiz-q-hanzi" style="'+(q.isCn?'':'font-size:22px;font-family:Be Vietnam Pro')+'">'+q.prompt+'</div><div class="quiz-q-pinyin">'+q.sub+'</div></div><div class="quiz-options">'+optHtml+'</div></div>';
}

function gen79Quiz(s,type){
  const words=shuffle(s.words);const pool=HSK79_ALL;
  state.quizQuestions=words.map(w=>{
    if(type==='meaning'){
      const cn=Math.random()<0.5;
      if(cn){let wr=shuffle(pool.filter(x=>x.vi!==w.vi).map(x=>x.vi)).slice(0,3);let opts=shuffle([w.vi,...wr]);return{prompt:w.h,sub:w.p,ci:opts.indexOf(w.vi),options:opts,sel:-1,isCn:false}}
      else{let wr=shuffle(pool.filter(x=>x.h!==w.h).map(x=>x.h)).slice(0,3);let opts=shuffle([w.h,...wr]);return{prompt:w.vi,sub:'Chọn từ tiếng Trung đúng',ci:opts.indexOf(w.h),options:opts,sel:-1,isCn:true}}
    }else{
      let wr=shuffle(pool.filter(x=>x.h!==w.h).map(x=>x.h)).slice(0,3);let opts=shuffle([w.h,...wr]);return{prompt:w.vi,sub:'Chọn từ đúng',ci:opts.indexOf(w.h),options:opts,sel:-1,isCn:true};
    }
  });
  state.quizIndex=0;state.quizScore=0;state.quizAnswered=false;state.quizDone=false;
}

function r79Fill(s){
  if(!state.quizQuestions.length||state.rQuizType!==('79f_'+s.id)){state.rQuizType='79f_'+s.id;gen79Fill(s)}
  if(state.quizDone){const t=state.quizQuestions.length,p=Math.round(state.quizScore/t*100);let m=p>=90?'🎉 Xuất sắc!':p>=70?'👍 Khá tốt!':p>=50?'💪 Cần ôn thêm!':'📚 Hãy ôn lại nhé!';return '<div class="quiz-result fade-in"><div class="quiz-score">'+state.quizScore+'/'+t+'</div><div class="quiz-score-label">'+m+' Đúng '+p+'%</div><button class="quiz-restart" data-action="quiz-restart-79">Làm lại</button></div>'}
  const q=state.quizQuestions[state.quizIndex],pr=(state.quizIndex/state.quizQuestions.length)*100;
  let optHtml=q.options.map((o,i)=>{let c='';if(state.quizAnswered){if(i===q.ci)c='correct';else if(i===q.sel)c='wrong'}return '<button class="quiz-option '+c+'" data-quiz-opt="'+i+'" '+(state.quizAnswered?'disabled':'')+'>'+o+'</button>'}).join('');
  return '<div class="quiz-container fade-in"><div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:'+pr+'%"></div></div><div class="quiz-question"><div class="quiz-q-label">Câu '+(state.quizIndex+1)+'/'+state.quizQuestions.length+' — Điền từ vào chỗ trống</div><div style="font-family:Noto Sans SC,sans-serif;font-size:24px;font-weight:500;color:var(--ink);line-height:1.6;margin:12px 0">'+q.sentence+'</div><div class="quiz-q-pinyin" style="font-size:13px">'+q.hint+'</div></div><div class="quiz-options">'+optHtml+'</div></div>';
}

function gen79Fill(s){
  const pool=s.words.filter(w=>w.ex&&w.ex.length>3);const all=HSK79_ALL;
  const words=shuffle(pool).slice(0,Math.min(20,pool.length));
  state.quizQuestions=words.map(w=>{
    let ex=w.ex;let idx=ex.indexOf('(');
    let cn=idx>0?ex.substring(0,idx).trim():ex.split('；')[0].split(';')[0];
    let vi=idx>0?ex.substring(idx):w.vi;
    let blank=cn.replace(w.h,'______');
    if(blank===cn){for(let i=0;i<w.h.length&&i<2;i++){let ch=w.h.charAt(i);if(cn.indexOf(ch)>=0){blank=cn.replace(new RegExp(w.h.charAt(0)+'[^，。！？\s]*'),'______');break}}}
    let wr=shuffle(all.filter(x=>x.h!==w.h).map(x=>x.h)).slice(0,3);
    let opts=shuffle([w.h,...wr]);
    return{sentence:blank,hint:vi,ci:opts.indexOf(w.h),options:opts,sel:-1};
  });
  state.quizIndex=0;state.quizScore=0;state.quizAnswered=false;state.quizDone=false;
}

function renderLesson(){
  const lessons=getLessons();
  const lesson=lessons.find(l=>l.id===state.lessonId);
  if(!lesson)return '';
  return '<div class="fade-in"><div><button class="back-btn" data-action="back">← Quay lại</button><div class="lesson-view-title">第'+lesson.id+'课 · '+lesson.title+'</div><div class="lesson-view-sub">'+lesson.titleVi+' — '+lesson.words.length+' từ vựng</div></div><div class="mode-tabs"><button class="mode-tab '+(state.mode==='list'?'active':'')+'" data-mode="list">📋 Danh sách</button><button class="mode-tab '+(state.mode==='flashcard'?'active':'')+'" data-mode="flashcard">🃏 Lật thẻ</button><button class="mode-tab '+(state.mode==='quiz'?'active':'')+'" data-mode="quiz">✏️ Trắc nghiệm</button></div>'+(state.mode==='list'?renderWordList(lesson):'')+(state.mode==='flashcard'?renderFlashcard(lesson):'')+(state.mode==='quiz'?renderQuiz(lesson):'')+'</div>';
}

function renderWordList(lesson){
  let items=lesson.words.map(w=>'<div class="word-item"><button class="audio-btn" data-speak="'+w.hanzi+'">🔊</button><div class="word-hanzi">'+w.hanzi+'</div><div class="word-info"><div class="word-pinyin">'+w.pinyin+'</div><div class="word-meaning">'+w.vi+' · '+w.en+'</div></div>'+(w.pos?'<div class="word-pos">'+w.pos+'</div>':'')+'</div>').join('');
  return '<div class="toolbar"><span class="word-count">'+lesson.words.length+' từ</span></div><div class="word-list">'+items+'</div>';
}

function renderFlashcard(lesson){
  if(!state.fcShuffled.length){state.fcShuffled=shuffle(lesson.words);state.fcIndex=0;state.fcFlipped=false}
  const w=state.fcShuffled[state.fcIndex];
  return '<div class="flashcard-container"><div class="flashcard-progress">'+(state.fcIndex+1)+' / '+state.fcShuffled.length+'</div><div class="flashcard" data-action="flip"><div class="flashcard-inner '+(state.fcFlipped?'flipped':'')+'"><div class="flashcard-front"><div class="fc-hanzi">'+w.hanzi+'</div><div class="fc-hint">Nhấn hoặc Space để lật · ← → chuyển từ</div></div><div class="flashcard-back"><div class="fc-pinyin">'+w.pinyin+'</div><div class="fc-meaning">'+w.vi+'<br><small style="opacity:0.7">'+w.en+'</small></div></div></div></div><div class="fc-controls"><button class="fc-btn prev" data-action="fc-prev" '+(state.fcIndex===0?'disabled':'')+'>← Trước</button><button class="shuffle-btn" data-action="fc-shuffle">🔀 Xáo trộn</button><button class="fc-btn next" data-action="fc-next" '+(state.fcIndex>=state.fcShuffled.length-1?'disabled':'')+'>Tiếp →</button></div></div>';
}

function renderQuiz(lesson){
  if(!state.quizQuestions.length)generateQuiz(lesson);
  if(state.quizDone){const t=state.quizQuestions.length,p=Math.round(state.quizScore/t*100);let m=p>=90?'🎉 Xuất sắc!':p>=70?'👍 Khá tốt!':p>=50?'💪 Cần ôn thêm!':'📚 Hãy ôn lại nhé!';return '<div class="quiz-result fade-in"><div class="quiz-score">'+state.quizScore+'/'+t+'</div><div class="quiz-score-label">'+m+' Đúng '+p+'%</div><button class="quiz-restart" data-action="quiz-restart">Làm lại</button></div>'}
  const q=state.quizQuestions[state.quizIndex],pr=(state.quizIndex/state.quizQuestions.length)*100;
  let qLabel=q.type==='vn2cn'?'Chọn từ tiếng Trung:':'Chọn nghĩa tiếng Việt:';
  let qStyle=q.type==='vn2cn'?'font-size:22px;font-weight:600;font-family:Be Vietnam Pro,sans-serif':'';
  let opts=q.options.map((o,i)=>{let c='';if(state.quizAnswered){if(i===q.ci)c='correct';else if(i===q.sel)c='wrong'}return '<button class="quiz-option '+c+'" data-quiz-opt="'+i+'" '+(state.quizAnswered?'disabled':'')+' style="'+(q.type==='vn2cn'?'font-family:Noto Sans SC,sans-serif;font-size:20px':'')+'">'+o+'</button>'}).join('');
  return '<div class="quiz-container fade-in"><div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:'+pr+'%"></div></div><div class="quiz-question"><div class="quiz-q-label">Câu '+(state.quizIndex+1)+'/'+state.quizQuestions.length+' — '+qLabel+'</div><div class="quiz-q-hanzi" style="'+qStyle+'">'+q.hanzi+'</div><div class="quiz-q-pinyin">'+q.pinyin+'</div></div><div class="quiz-options">'+opts+'</div></div>';
}

function generateQuiz(lesson){
  const words=shuffle(lesson.words);
  const allW=getAllWords();
  state.quizQuestions=words.map(w=>{
    const isCnToVn=Math.random()<0.5;
    if(isCnToVn){
      let wr=shuffle(allW.filter(x=>x.vi!==w.vi).map(x=>x.vi)).slice(0,3);
      let opts=shuffle([w.vi,...wr]);
      return{hanzi:w.hanzi,pinyin:w.pinyin,ci:opts.indexOf(w.vi),options:opts,sel:-1,type:'cn2vn'};
    }else{
      let wr=shuffle(allW.filter(x=>x.hanzi!==w.hanzi).map(x=>x.hanzi)).slice(0,3);
      let opts=shuffle([w.hanzi,...wr]);
      return{hanzi:w.vi,pinyin:'Chọn từ tiếng Trung đúng',ci:opts.indexOf(w.hanzi),options:opts,sel:-1,type:'vn2cn'};
    }
  });
  state.quizIndex=0;state.quizScore=0;state.quizAnswered=false;state.quizDone=false;
}

function attachEvents(){
  document.querySelectorAll('[data-nav]').forEach(b=>{b.onclick=()=>{if(b.dataset.nav==='home'){state.view='home'}else if(b.dataset.nav==='level'){state.view='level';state.level=b.dataset.lv}render();window.scrollTo({top:0,behavior:'smooth'})}});
  document.querySelectorAll('[data-lesson]').forEach(c=>{c.onclick=()=>{const lv=c.dataset.lv;if(lv)state.level=lv;state.view='lesson';state.lessonId=parseInt(c.dataset.lesson);state.mode='list';state.fcShuffled=[];state.quizQuestions=[];render();window.scrollTo({top:0,behavior:'smooth'})}});
  document.querySelectorAll('[data-action]').forEach(b=>{b.onclick=(e)=>{e.stopPropagation();const a=b.dataset.action;if(a==='back'){state.view='level';render()}if(a==='flip'){state.fcFlipped=!state.fcFlipped;render()}if(a==='fc-prev'){state.fcIndex--;state.fcFlipped=false;render()}if(a==='fc-next'){state.fcIndex++;state.fcFlipped=false;render()}if(a==='fc-shuffle'){const l=getLessons().find(x=>x.id===state.lessonId);state.fcShuffled=shuffle(l.words);state.fcIndex=0;state.fcFlipped=false;render()}if(a==='quiz-restart'){const l=getLessons().find(x=>x.id===state.lessonId);generateQuiz(l);render()}}});
  document.querySelectorAll('[data-mode]').forEach(b=>{b.onclick=()=>{state.mode=b.dataset.mode;if(state.mode==='flashcard')state.fcShuffled=[];if(state.mode==='quiz')state.quizQuestions=[];render()}});
  document.querySelectorAll('[data-hsk79set]').forEach(c=>{c.onclick=()=>{state.view='hsk79set';state.lessonId=parseInt(c.dataset.hsk79set);state.mode='list';state.fcShuffled=[];state.quizQuestions=[];render();window.scrollTo({top:0,behavior:'smooth'})}});
  document.querySelectorAll('[data-m79]').forEach(b=>{b.onclick=()=>{state.mode=b.dataset.m79;state.fcShuffled=[];state.quizQuestions=[];render()}});
  document.querySelectorAll('[data-action="back-hsk79"]').forEach(b=>{b.onclick=()=>{state.view='level';state.level='hsk79';render()}});
  document.querySelectorAll('[data-action="fc-shuffle-79"]').forEach(b=>{b.onclick=(e)=>{e.stopPropagation();const s=getHSK79Sets().find(x=>x.id===state.lessonId);state.fcShuffled=shuffle(s.words);state.fcIndex=0;state.fcFlipped=false;render()}});
  document.querySelectorAll('[data-action="quiz-restart-79"]').forEach(b=>{b.onclick=()=>{const s=getHSK79Sets().find(x=>x.id===state.lessonId);if(state.rQuizType.startsWith('79f_'))gen79Fill(s);else{let t=state.mode;gen79Quiz(s,t)}render()}});
  document.querySelectorAll('[data-rmode2]').forEach(b=>{b.onclick=()=>{state.rMode=b.dataset.rmode2;state.fcShuffled=[];state.quizQuestions=[];render()}});
  document.querySelectorAll('[data-action="open-review2"]').forEach(b=>{b.onclick=()=>{state.view='review2';state.rMode='list';state.fcShuffled=[];state.quizQuestions=[];render();window.scrollTo({top:0,behavior:'smooth'})}});
  document.querySelectorAll('[data-action="back-review2"]').forEach(b=>{b.onclick=()=>{state.view='level';state.level='hsk2';render()}});
  document.querySelectorAll('[data-action="fc-shuffle-r2"]').forEach(b=>{b.onclick=(e)=>{e.stopPropagation();state.fcShuffled=shuffle(HSK2_ALL);state.fcIndex=0;state.fcFlipped=false;render()}});
  document.querySelectorAll('[data-action="quiz-restart-r2"]').forEach(b=>{b.onclick=()=>{if(state.rQuizType==='r2_fillin')genR2FillIn();else{let t=state.rQuizType.replace('r2_','');genR2Quiz(t)}render()}});
  document.querySelectorAll('[data-rmode]').forEach(b=>{b.onclick=()=>{state.rMode=b.dataset.rmode;state.fcShuffled=[];state.quizQuestions=[];render()}});
  document.querySelectorAll('[data-action="open-review"]').forEach(b=>{b.onclick=()=>{state.view='review';state.rMode='list';state.fcShuffled=[];state.quizQuestions=[];render();window.scrollTo({top:0,behavior:'smooth'})}});
  document.querySelectorAll('[data-action="back-review"]').forEach(b=>{b.onclick=()=>{state.view='level';state.level='hsk1';render()}});
  document.querySelectorAll('[data-action="fc-shuffle-review"]').forEach(b=>{b.onclick=(e)=>{e.stopPropagation();state.fcShuffled=shuffle(HSK1_ALL);state.fcIndex=0;state.fcFlipped=false;render()}});
  document.querySelectorAll('[data-action="quiz-restart-review"]').forEach(b=>{b.onclick=()=>{generateReviewQuiz(state.rQuizType);render()}});
  document.querySelectorAll('[data-speak]').forEach(b=>{b.onclick=(e)=>{e.stopPropagation();speak(b.dataset.speak)}});
  document.querySelectorAll('[data-quiz-opt]').forEach(b=>{b.onclick=()=>{if(state.quizAnswered)return;const i=parseInt(b.dataset.quizOpt);const q=state.quizQuestions[state.quizIndex];q.sel=i;state.quizAnswered=true;if(i===q.ci)state.quizScore++;render();setTimeout(()=>{if(state.quizIndex<state.quizQuestions.length-1){state.quizIndex++;state.quizAnswered=false;render()}else{state.quizDone=true;render()}},1200)}});
}

document.addEventListener('keydown',function(e){
  if(state.mode==='flashcard'||(state.view==='review'&&state.rMode==='flashcard')||(state.view==='review2'&&state.rMode==='flashcard')||(state.view==='hsk79set'&&state.mode==='flashcard')){
    if(e.code==='Space'||e.code==='ArrowUp'||e.code==='ArrowDown'){e.preventDefault();state.fcFlipped=!state.fcFlipped;render()}
    if(e.code==='ArrowRight'){e.preventDefault();if(state.fcIndex<state.fcShuffled.length-1){state.fcIndex++;state.fcFlipped=false;render()}}
    if(e.code==='ArrowLeft'){e.preventDefault();if(state.fcIndex>0){state.fcIndex--;state.fcFlipped=false;render()}}
    if(e.code==='KeyS'||e.code==='KeyR'){e.preventDefault();if(state.fcShuffled.length)speak(state.fcShuffled[state.fcIndex].hanzi)}
  }
});
render();
</script></body></html>
