function toggleWordStrokes(el,hanzi){
  const existing=el.querySelector('.word-strokes');
  if(existing){existing.remove();expandedWord=null;return}
  document.querySelectorAll('.word-strokes').forEach(s=>s.remove());
  expandedWord=hanzi;
  const div=document.createElement('div');
  div.className='word-strokes';
  hwInstances=[];
  const chars=hanzi.split('');
  const targets=[];
  chars.forEach((ch,i)=>{
    const wrap=document.createElement('div');
    wrap.className='stroke-char';
    const svgDiv=document.createElement('div');
    targets.push({el:svgDiv,ch:ch});
    wrap.appendChild(svgDiv);
    const label=document.createElement('span');
    label.textContent=ch;
    wrap.appendChild(label);
    div.appendChild(wrap);
  });
  const playBtn=document.createElement('button');
  playBtn.className='stroke-play';
  playBtn.textContent='▶ Xem cách viết';
  playBtn.onclick=function(e){e.stopPropagation();hwInstances.forEach(function(w){w.animateCharacter()})};
  div.appendChild(playBtn);

  el.appendChild(div);
  setTimeout(function(){
    targets.forEach(function(t){
      if(typeof HanziWriter!=='undefined'){
        try{
          var w=HanziWriter.create(t.el,t.ch,{width:80,height:80,padding:5,strokeAnimationSpeed:1,delayBetweenStrokes:300,strokeColor:'#1A1A2E',radicalColor:'#D96B64',showOutline:true,showCharacter:false});
          hwInstances.push(w);
          w.animateCharacter();
        }catch(e){t.el.innerHTML='<span style="font-size:40px;font-family:Noto Sans SC">'+t.ch+'</span>'}
      }else{t.el.innerHTML='<span style="font-size:40px;font-family:Noto Sans SC">'+t.ch+'</span>'}
    });
  },100);
}

function speak(text){
  if('speechSynthesis' in window){
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='zh-CN';u.rate=0.8;
    const voices=window.speechSynthesis.getVoices();
    const zh=voices.find(v=>v.lang.startsWith('zh'));
    if(zh)u.voice=zh;
    window.speechSynthesis.speak(u);
  }
}
window.speechSynthesis&&window.speechSynthesis.getVoices();

// ═══ WEB SPEECH API — Phát âm ═══
function normalizeChinese(text){return text.replace(/[，。！？、；：""''【】《》（）\s,\.!\?;:'"\(\)\[\]{}…—–\-]/g,'')}

function startSpeechRecognition(text,contextKey){
  if(state.speechRec){stopSpeechRecognition();return}
  var SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition){showToast('Trình duyệt không hỗ trợ nhận diện giọng nói. Dùng Chrome hoặc Edge.','error');return}
  var recognition=new SpeechRecognition();
  recognition.lang='zh-CN';recognition.maxAlternatives=1;
  var isReading=contextKey.indexOf('rd-full-')===0;
  recognition.continuous=isReading;recognition.interimResults=isReading;
  var allText='';
  recognition.onresult=function(event){
    for(var i=event.resultIndex;i<event.results.length;i++){
      if(event.results[i].isFinal){allText+=event.results[i][0].transcript}
    }
    if(!isReading){
      var recognized=event.results[0][0].transcript;
      var match=normalizeChinese(recognized)===normalizeChinese(text);
      state.speechResults[contextKey]={match:match,recognized:recognized,original:text,score:match?100:0};
      state.speechRec=null;
      if(match){showToast('Đọc chuẩn! (100đ)','success')}else{showToast('Chưa chính xác, hãy thử lại: '+recognized,'error')}
      render();
    }
  };
  recognition.onerror=function(event){
    if(event.error==='no-speech'){ return}
    else if(event.error!=='aborted'){showToast('Lỗi nhận diện: '+event.error,'error')}
    state.speechRec=null;state.speechProcessing=null;render();
  };
  recognition.onend=function(){
    if(!state.speechRec||state.speechRec.status!=='recording')return;
    if(isReading&&allText){
      var scored=scoreReading(text,allText);
      state.speechResults[contextKey]=scored;state.speechRec=null;state.speechProcessing=null;
      showToast('Kết quả: '+scored.correct+'/'+scored.total+' ký tự đúng ('+scored.score+'%)',scored.score>=80?'success':scored.score>=50?'':'error');
      render();
    }else if(isReading){
      try{recognition.start()}catch(e){state.speechRec=null;state.speechProcessing=null;render()}
    }else{state.speechRec=null;render()}
  };
  try{recognition.start()}catch(e){showToast('Không thể khởi động mic: '+e.message,'error');return}
  state.speechRec={text:text,contextKey:contextKey,status:'recording',recognition:recognition};
  render();
}

function stopSpeechRecognition(){
  if(!state.speechRec||state.speechRec.status!=='recording')return;
  var key=state.speechRec.contextKey;
  if(key&&key.indexOf('rd-full-')===0){state.speechProcessing=key;render()}
  try{state.speechRec.recognition.stop()}catch(e){}
}












function getHSK79Sets(){
  const sets=[];const sz=20;
  for(let i=0;i<HSK79_ALL.length;i+=sz){
    const id=Math.floor(i/sz)+1;
    sets.push({id,words:HSK79_ALL.slice(i,i+sz),start:i+1,end:Math.min(i+sz,HSK79_ALL.length)});
  }
  return sets;
}

{gr:"So sánh",cat:"Giới từ",cn:"凭 vs 经过 vs 沿",py:"píng vs jīngguò vs yán",vi:"凭=dựa vào (căn cứ), 经过=qua/trải qua (quá trình), 沿=dọc theo (phương hướng)",eg:["凭什么？(Píng shénme?) Dựa vào cái gì? — 凭+căn cứ","经过三年努力，他成功了。(Jīngguò sān nián nǔlì, tā chénggōng le.) Qua 3 năm nỗ lực, anh ấy thành công — 经过+quá trình","沿着这条路一直走。(Yánzhe zhè tiáo lù yìzhí zǒu.) Đi dọc con đường này — 沿+phương hướng"]},
{gr:"So sánh",cat:"Liên từ giả thiết",cn:"假如 vs 假设",py:"jiǎrú vs jiǎshè",vi:"假如=nếu (giả định, khẩu ngữ hơn), 假设=giả sử (giả định, lý thuyết hơn)",eg:["假如我是你，就不去。(Jiǎrú wǒ shì nǐ, jiù bú qù.) Nếu tôi là bạn thì không đi — 假如 khẩu ngữ","假设没有电，生活会怎样？(Jiǎshè méiyǒu diàn, shēnghuó huì zěnyàng?) Giả sử không có điện, cuộc sống sẽ ra sao? — 假设 lý thuyết","假如明天放假，我们去爬山。(Jiǎrú míngtiān fàngjià, wǒmen qù páshān.)"]},
{gr:"Liên từ",cat:"Một khi…liền",cn:"一旦…就/便…",py:"yídàn…jiù/biàn…",vi:"một khi (xảy ra) thì ngay lập tức…",eg:["一旦决定就不改变。(Yídàn juédìng jiù bù gǎibiàn.) Một khi quyết thì không đổi","一旦发现问题就报告。(Yídàn fāxiàn wèntí jiù bàogào.) Một khi phát hiện vấn đề liền báo cáo","一旦失去就回不来了。(Yídàn shīqù jiù huí bu lái le.) Một khi mất đi thì không quay lại được"]},
{gr:"So sánh",cat:"Liên từ",cn:"不是…而是 vs 与其…不如",py:"búshì…érshì vs yǔqí…bùrú",vi:"不是A而是B=không phải A mà là B (sửa sai), 与其A不如B=thà B còn hơn A (lựa chọn)",eg:["不是不想去，而是没时间。(Búshì bù xiǎng qù, érshì méi shíjiān.) Không phải không muốn đi, mà là không có thời gian — sửa hiểu lầm","与其在家等，不如出去找。(Yǔqí zài jiā děng, bùrú chūqù zhǎo.) Thà ra ngoài tìm còn hơn ở nhà chờ — so sánh chọn phương án tốt hơn","不是他的错，而是我的。(Búshì tā de cuò, érshì wǒ de.) Không phải lỗi anh ấy, mà là lỗi tôi"]},
{gr:"So sánh",cat:"Câu so sánh",cn:"A不如B vs A没有B那么",py:"A bùrú B vs A méiyǒu B nàme",vi:"不如=không bằng (đánh giá chung), 没有…那么=không…đến mức (so sánh cụ thể)",eg:["我不如他聪明。(Wǒ bùrú tā cōngmíng.) Tôi không thông minh bằng anh ấy — 不如 đánh giá chung","坐车不如走路健康。(Zuòchē bùrú zǒulù jiànkāng.) Đi xe không tốt cho sức khỏe bằng đi bộ","他没有你那么高。(Tā méiyǒu nǐ nàme gāo.) Anh ấy không cao bằng bạn — 没有…那么 so sánh cụ thể"]},
{gr:"Bổ ngữ",cat:"Xu hướng mở rộng",cn:"V+起来/下来/下去/出来",py:"qǐlái/xiàlái/xiàqù/chūlái",vi:"起来=bắt đầu, 下来=dừng lại/ghi lại, 下去=tiếp tục, 出来=nhận ra/tạo ra",eg:["天气暖和起来了。(Tiānqì nuǎnhuo qǐlái le.) Trời bắt đầu ấm lên — 起来 bắt đầu trạng thái mới","请安静下来。(Qǐng ānjìng xiàlái.) Xin hãy yên lặng lại — 下来 từ động sang tĩnh","坚持学下去。(Jiānchí xué xiàqù.) Kiên trì học tiếp — 下去 tiếp tục hành động"]},

{gr:"So sánh",cat:"Phó từ quan hệ",cn:"从而 vs 进而 vs 以便",py:"cóng'ér vs jìn'ér vs yǐbiàn",vi:"从而=từ đó (kết quả), 进而=tiến thêm (nâng cao), 以便=để cho (mục đích)",eg:["努力学习，从而取得好成绩。(Nǔlì xuéxí, cóng'ér qǔdé hǎo chéngjì.) Chăm học, từ đó đạt thành tích tốt — 从而 kết quả","先了解基础，进而深入研究。(Xiān liǎojiě jīchǔ, jìn'ér shēnrù yánjiū.) Trước hiểu cơ bản, tiến tới nghiên cứu sâu — 进而 nâng cấp","请提前通知，以便我们准备。(Qǐng tíqián tōngzhī, yǐbiàn wǒmen zhǔnbèi.) Xin báo trước để chúng tôi chuẩn bị — 以便 mục đích"]},

const DEEPSEEK_API_KEY = import.meta.env.VITE_DEEPSEEK_KEY || '';
const DEEPSEEK_API_URL = 'https://api.deepseek.com/chat/completions';

function getWritingWordPool() {
  // Lấy danh sách hanzi từ cấp hiện tại và các cấp thấp hơn
  let pool = [];
  const lv = state.writingLevel || state.level;
  if (lv === 'hsk1' || lv === 'hsk2' || lv === 'hsk3' || lv === 'hsk4' || lv === 'hsk5' || lv === 'hsk6' || lv === 'hsk79') {
    if (lv === 'hsk1' || lv === 'hsk2' || lv === 'hsk3') {
      if (typeof HSK1_ALL !== 'undefined') pool = pool.concat(HSK1_ALL);
      if (typeof HSK2_ALL !== 'undefined' && (lv === 'hsk2' || lv === 'hsk3')) pool = pool.concat(HSK2_ALL);
      if (typeof HSK3_ALL !== 'undefined' && lv === 'hsk3') pool = pool.concat(HSK3_ALL);
    } else {
      if (typeof HSK1_ALL !== 'undefined') pool = pool.concat(HSK1_ALL);
      if (typeof HSK2_ALL !== 'undefined') pool = pool.concat(HSK2_ALL);
      if (typeof HSK3_ALL !== 'undefined') pool = pool.concat(HSK3_ALL);
      if (lv === 'hsk4' && typeof HSK4_ALL !== 'undefined') pool = pool.concat(HSK4_ALL);
      if (lv === 'hsk5' && typeof HSK5_ALL !== 'undefined') pool = pool.concat(HSK5_ALL);
      if (lv === 'hsk6' && typeof HSK6_ALL !== 'undefined') pool = pool.concat(HSK6_ALL);
      if (lv === 'hsk79' && typeof HSK79_ALL !== 'undefined') pool = pool.concat(HSK79_ALL);
    }
  }
  if (!pool.length) pool = HSK1_ALL || [];
  return pool;
}

function buildWritingPrompt(subMode) {
  const pool = getWritingWordPool();
  const hanziList = pool.map(w => w.hanzi || w.h).filter(Boolean).join(', ');
  const levelLabel = state.writingLevel || state.level || 'hsk1';

  if (subMode === 'short') {
    return `Bạn là giáo viên tiếng Trung. Hãy tạo ${Math.floor(Math.random()*4)+5} câu tiếng Trung ĐỘC LẬP (không liên quan đến nhau, mỗi câu một chủ đề khác nhau) cho học sinh trình độ ${levelLabel.toUpperCase()}.

DANH SÁCH TỪ VỰNG ĐƯỢC PHÉP SỬ DỤNG (CHỈ dùng chữ Hán trong danh sách này):
${hanziList}

QUY TẮC:
- Mỗi câu là một chủ đề khác nhau, KHÔNG liên quan đến nhau.
- Mỗi câu có độ dài vừa phải (5-15 chữ Hán).
- Chỉ dùng chữ Hán trong danh sách trên.

TRẢ VỀ CHỈ MỘT MẢNG JSON (không markdown, không giải thích):
[
  {"step":1,"vi":"Câu tiếng Việt","zh":"Câu tiếng Trung","pinyin":"Phiên âm có dấu"},
  ...
]`;
  } else {
    return `Bạn là giáo viên tiếng Trung. Hãy viết một BÀI VĂN DÀI LIỀN MẠCH bằng tiếng Trung cho học sinh trình độ ${levelLabel.toUpperCase()}.

DANH SÁCH TỪ VỰNG ĐƯỢC PHÉP SỬ DỤNG (CHỈ dùng chữ Hán trong danh sách này):
${hanziList}

QUY TẮC:
- Viết một bài văn khoảng 6-10 câu, LIỀN MẠCH, có mở đầu, thân, kết.
- Chủ đề thú vị, tự nhiên (ví dụ: một ngày của tôi, gia đình, sở thích...).
- Chỉ dùng chữ Hán trong danh sách trên.

TRẢ VỀ CHỈ MỘT MẢNG JSON (không markdown, không giải thích):
[
  {"step":1,"vi":"Câu 1 tiếng Việt","zh":"Câu 1 tiếng Trung","pinyin":"Phiên âm"},
  ...
]`;
  }
}

async function callDeepSeekWriting(subMode) {
  console.log('callDeepSeekWriting called, subMode='+subMode, 'hasApiKey='+!!DEEPSEEK_API_KEY);
  if (!DEEPSEEK_API_KEY) {
    console.log('No API key, using local fallback');
    return generateLocalWritingData(subMode);
  }
  const prompt = buildWritingPrompt(subMode);
  console.log('Prompt length:', prompt.length);
  try {
    const resp = await fetch(DEEPSEEK_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_API_KEY },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: 'Bạn là trợ lý tạo nội dung học tiếng Trung. CHỈ trả về JSON hợp lệ, không markdown, không giải thích.' },
          { role: 'user', content: prompt }
        ],
        temperature: 0.8,
        max_tokens: 2000,
      })
    });
    console.log('DeepSeek response status:', resp.status);
    if (!resp.ok) {
      const errText = await resp.text();
      console.error('DeepSeek error body:', errText.substring(0,200));
      throw new Error('API lỗi: ' + resp.status);
    }
    const json = await resp.json();
    const content = json.choices[0].message.content.trim();
    console.log('Raw AI response:', content.substring(0,200));
    const clean = content.replace(/^```json\s*/, '').replace(/```$/, '').trim();
    console.log('Cleaned JSON:', clean.substring(0,200));
    const data = JSON.parse(clean);
    if (!Array.isArray(data)) throw new Error('AI không trả về mảng JSON hợp lệ');
    console.log('Parsed data, steps:', data.length);
    return data;
  } catch (e) {
    console.error('DeepSeek API error:', e.message, e);
    return generateLocalWritingData(subMode);
  }
}

async function callDeepSeekGrading(subMode, writingData, userInputs) {
  console.log('callDeepSeekGrading (batch) called, sentences:', writingData.length);
  if (!DEEPSEEK_API_KEY) {
    console.log('No API key, using local grading');
    return generateLocalGrading(writingData, userInputs);
  }
  // Build prompt with all sentences
  let sentencesBlock = writingData.map((d,i) => {
    const user = userInputs[i] || '';
    return `Câu ${i+1}:\n- Tiếng Việt: ${d.vi}\n- Đáp án mẫu: ${d.zh}\n- Học sinh viết: ${user}`;
  }).join('\n\n');

  const prompt = `Bạn là giáo viên tiếng Trung. Hãy CHẤM mục THANG 10 cho TỪNG CÂU học sinh viết.

${sentencesBlock}

TIÊU CHÍ CHẤM (mỗi câu):
- 9-10đ: Câu đúng hoàn toàn, tự nhiên, đúng ngữ pháp + từ vựng
- 7-8đ: Câu đúng ý nhưng có 1-2 lỗi nhỏ
- 5-6đ: Câu hiểu được nhưng sai vài từ hoặc ngữ pháp
- 3-4đ: Câu sai nhiều, chỉ đúng một phần nhỏ
- 0-2đ: Câu sai hoàn toàn hoặc không liên quan

Với MỖI câu, trả về mục số + giải thích ngắn + các đoạn text để tô màu:
- Từ đúng → correct: true
- Từ sai → correct: false, kèm "fix" (từ đúng) và "reason" (lý do ngắn tiếng Việt)

TRẢ VỀ CHỈ MỘT OBJECT JSON (không markdown):
{
  "overall": "Nhận xét tổng quan và tổng mục",
  "totalScore": 8.5,
  "maxScore": 10,
  "sentences": [
    {"step":1, "score":9, "maxScore":10, "comment":"Rất tốt! Chỉ sai dấu câu.", "segments":[
      {"text":"我喜欢","correct":true},
      {"text":"狗","correct":false,"fix":"猫","reason":"Câu gốc nói về mèo"}
    ]},
    ...
  ]
}`;
  try {
    const resp = await fetch(DEEPSEEK_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_API_KEY },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: 'Bạn là giáo viên tiếng Trung. CHỈ trả về JSON hợp lệ, không markdown, không giải thích ngoài JSON.' },
          { role: 'user', content: prompt }
        ],
        temperature: 0.4,
        max_tokens: 2000,
      })
    });
    if (!resp.ok) throw new Error('API lỗi: ' + resp.status);
    const json = await resp.json();
    const content = json.choices[0].message.content.trim();
    const clean = content.replace(/^```json\s*/, '').replace(/```$/, '').trim();
    return JSON.parse(clean);
  } catch (e) {
    console.error('Batch grading error:', e);
    return generateLocalGrading(writingData, userInputs);
  }
}

function generateLocalGrading(writingData, userInputs) {
  var totalScore = 0;
  const sentences = writingData.map((d, i) => {
    const user = (userInputs[i] || '').trim();
    const expected = d.zh.trim();
    if (!user) { return { step: i+1, score: 0, maxScore: 10, comment: 'Chưa viết', segments: [{ text: '_(chưa viết)_', correct: false, fix: expected, reason: 'Bạn chưa viết câu này' }] }; }
    if (user === expected) { totalScore += 10; return { step: i+1, score: 10, maxScore: 10, comment: 'Xuất sắc!', segments: [{ text: user, correct: true }] }; }
    // Count matching chars for score
    var matchCount = 0;
    var maxChars = Math.max(user.length, expected.length);
    for (var j = 0; j < Math.min(user.length, expected.length); j++) { if (user[j] === expected[j]) matchCount++; }
    var score = Math.round(matchCount / maxChars * 10);
    totalScore += score;
    var comment = score >= 9 ? 'Xuất sắc!' : score >= 7 ? 'Tốt' : score >= 5 ? 'Khá' : score >= 3 ? 'Cần cải thiện' : 'Sai nhiều';
    // Simple diff: split into chars and compare
    const segs = [];
    const userChars = [...user];
    const expChars = [...expected];
    const maxLen = Math.max(userChars.length, expChars.length);
    let currentText = '', currentCorrect = null;
    for (let j = 0; j < maxLen; j++) {
      const uc = userChars[j] || '';
      const ec = expChars[j] || '';
      const match = uc === ec;
      if (currentCorrect !== match && currentText) {
        segs.push({ text: currentText, correct: !!currentCorrect });
        currentText = '';
      }
      currentCorrect = match;
      currentText += uc || ec;
    }
    if (currentText) segs.push({ text: currentText, correct: !!currentCorrect });
    if (segs.length === 0) segs.push({ text: user, correct: user === expected });
    return { step: i+1, score: score, maxScore: 10, comment: comment, segments: segs };
  });
  var avg = writingData.length ? Math.round(totalScore / writingData.length * 10) / 10 : 0;
  return { overall: 'Tổng: ' + avg + '/10 · Chấm tự động (so sánh ký tự)', totalScore: avg, maxScore: 10, sentences: sentences };
}

}

      else{let wr=shuffle(all.filter(x=>x.hanzi!==w.hanzi).map(x=>x.hanzi)).slice(0,3);let opts=shuffle([w.hanzi,...wr]);return{prompt:w.vi,subtext:'Chọn từ tiếng Trung đúng',ci:opts.indexOf(w.hanzi),options:opts,sel:-1}}
    });

    state.quizQuestions=words.map(w=>{let wr=shuffle(all.filter(x=>x.hanzi!==w.hanzi).map(x=>x.hanzi)).slice(0,3);let opts=shuffle([w.hanzi,...wr]);return{prompt:w.vi,subtext:'Chọn từ đúng',ci:opts.indexOf(w.hanzi),options:opts,sel:-1}});

function generateFillIn(){
  const pool=HSK1_ALL.filter(w=>w.ex&&w.ex.length>2);
  const words=shuffle(pool).slice(0,20);
  const all=HSK1_ALL;
  state.quizQuestions=words.map(w=>{
    let ex=w.ex;
    let idx=ex.indexOf('(');
    let cnPart=idx>0?ex.substring(0,idx).trim():ex;
    let viPart=idx>0?ex.substring(idx):'';
    let blank=cnPart.replace(w.hanzi,'______');
    if(blank===cnPart){
      let h=w.hanzi;
      for(let i=0;i<h.length;i++){
        let ch=h.charAt(i);
        if(cnPart.indexOf(ch)>=0){blank=cnPart.replace(ch,'__');break}

function gen456Fill(s,d){

function gen79Fill(s){
  const pool=s.words.filter(w=>w.ex&&w.ex.length>3);const all=HSK79_ALL;
  const words=shuffle(pool).slice(0,Math.min(20,pool.length));
  state.quizQuestions=words.map(w=>{
    let phrases=w.ex.split(/[；;]/).map(p=>p.trim()).filter(p=>p.length>1);
    let match=phrases.find(p=>p.indexOf(w.h)>=0)||phrases[0]||w.ex;
    let idx=match.indexOf('(');
    let cn=idx>0?match.substring(0,idx).trim():match;
    let vi=idx>0?match.substring(idx).trim():w.vi;
    let blank=cn.replace(w.h,'______');
    if(blank===cn){blank=cn.replace(new RegExp('['+w.h[0]+'][^，。！？ ]*'),'______')}
    let wr=shuffle(all.filter(x=>x.h!==w.h).map(x=>x.h)).slice(0,3);
    let opts=shuffle([w.h,...wr]);
    return{sentence:blank,hint:vi,ci:opts.indexOf(w.h),options:opts,sel:-1};
  });
  state.quizIndex=0;state.quizScore=0;state.quizAnswered=false;state.quizDone=false;
}

function getLessonGrammar(level, lessonId){
  var g;
  if(level==='hsk1')g=GRAMMAR_HSK1;
  else if(level==='hsk2')g=GRAMMAR_HSK2;
  else if(level==='hsk3')g=GRAMMAR_HSK3;
  else return[];
  return(g&&g[lessonId])?g[lessonId]:[];
}

function getSetGrammar(level, setId){
  var arr;
  if(level==='hsk4')arr=GRAMMAR_HSK4;
  else if(level==='hsk5')arr=GRAMMAR_HSK5;
  else if(level==='hsk6')arr=GRAMMAR_HSK6;
  else if(level==='hsk79')arr=GRAMMAR_HSK79G;
  else return[];
  if(!arr||!arr.length)return[];
  var totalSets;
  if(level==='hsk4')totalSets=Math.ceil((typeof HSK4_ALL!=='undefined'?HSK4_ALL.length:0)/20)||1;
  else if(level==='hsk5')totalSets=Math.ceil((typeof HSK5_ALL!=='undefined'?HSK5_ALL.length:0)/20)||1;
  else if(level==='hsk6')totalSets=Math.ceil((typeof HSK6_ALL!=='undefined'?HSK6_ALL.length:0)/20)||1;
  else totalSets=Math.ceil((typeof HSK79_ALL!=='undefined'?HSK79_ALL.length:0)/20)||1;
  var perSet=Math.ceil(arr.length/totalSets);
  var start=(setId-1)*perSet;
  return arr.slice(start,start+perSet);
}

      '<div class="reading-card"><div class="reading-zh" style="font-family:Noto Sans SC;font-size:18px;line-height:2">'+
        lesson.words.map(function(w){return w.hanzi}).join(' ')+

  }
  return '<div class="fade-in">'+
    '<div class="lesson-header">'+
      '<button class="lesson-back" data-action="back">'+icon('arrow-left',14)+' Quay lại</button>'+

      '<div class="lesson-title-sub">'+lesson.titleVi+' — <strong>'+lesson.words.length+' từ vựng</strong></div>'+
    '</div>'+
    content+
    readingHtml+
    grammarHtml+
  '</div>';

var READING_PASSAGES = {
  hsk1: [
    {id:1,zh:'你好！我是学生。你是老师吗？我不是老师，我是学生。我叫小明，我是中国人。我今年二十岁。我在北京大学学习。我学习汉语和英语。我有很多好朋友。他们都是很好的人。我很高兴认识你。你叫什么名字？你是哪国人？你会说汉语吗？认识你很高兴。',py:'Nǐ hǎo! Wǒ shì xuéshēng. Nǐ shì lǎoshī ma? Wǒ bú shì lǎoshī, wǒ shì xuéshēng. Wǒ jiào Xiǎomíng, wǒ shì Zhōngguó rén. Wǒ jīnnián èrshí suì. Wǒ zài Běijīng Dàxué xuéxí. Wǒ xuéxí Hànyǔ hé Yīngyǔ. Wǒ yǒu hěn duō hǎo péngyou. Tāmen dōu shì hěn hǎo de rén. Wǒ hěn gāoxìng rènshi nǐ. Nǐ jiào shénme míngzi? Nǐ shì nǎ guó rén? Nǐ huì shuō Hànyǔ ma? Rènshi nǐ hěn gāoxìng.',vi:'Xin chào! Tôi là học sinh. Bạn là giáo viên phải không? Tôi không phải giáo viên, tôi là học sinh. Tôi tên Tiểu Minh, tôi là người Trung Quốc. Tôi năm nay 20 tuổi. Tôi học ở Đại học Bắc Kinh. Tôi học tiếng Trung và tiếng Anh. Tôi có rất nhiều bạn tốt. Họ đều là những người rất tốt. Tôi rất vui được gặp bạn. Bạn tên là gì? Bạn là người nước nào? Bạn biết nói tiếng Trung không? Rất vui được gặp bạn.'},
    {id:2,zh:'我叫小明。你叫什么名字？我叫李华。我是中国人。你是哪国人？我是越南人。认识你很高兴。你家有几口人？我家有四口人：爸爸、妈妈、哥哥和我。我爸爸是医生，他在医院工作。我妈妈是老师，她在学校工作。我哥哥是大学生，他学习很好。我们都爱我们的家人。你呢？你家有谁？',py:'Wǒ jiào Xiǎomíng. Nǐ jiào shénme míngzi? Wǒ jiào Lǐ Huá. Wǒ shì Zhōngguó rén. Nǐ shì nǎ guó rén? Wǒ shì Yuènán rén. Rènshi nǐ hěn gāoxìng. Nǐ jiā yǒu jǐ kǒu rén? Wǒ jiā yǒu sì kǒu rén: bàba, māma, gēge hé wǒ. Wǒ bàba shì yīshēng, tā zài yīyuàn gōngzuò. Wǒ māma shì lǎoshī, tā zài xuéxiào gōngzuò. Wǒ gēge shì dàxuéshēng, tā xuéxí hěn hǎo. Wǒmen dōu ài wǒmen de jiārén. Nǐ ne? Nǐ jiā yǒu shéi?',vi:'Tôi tên Tiểu Minh. Bạn tên là gì? Tôi tên Lý Hoa. Tôi là người Trung Quốc. Bạn là người nước nào? Tôi là người Việt Nam. Rất vui được gặp bạn. Nhà bạn có mấy người? Nhà tôi có 4 người: bố, mẹ, anh trai và tôi. Bố tôi là bác sĩ, ông làm ở bệnh viện. Mẹ tôi là giáo viên, bà làm ở trường học. Anh tôi là sinh viên, anh ấy học rất giỏi. Chúng tôi đều yêu gia đình. Còn bạn? Nhà bạn có những ai?'},
    {id:3,zh:'我是中国人。她是谁？她是我的女朋友。她叫小美，她是中国人。她今年十九岁。她很漂亮，也很聪明。她在大学学习汉语。她喜欢看书和听音乐。我认识她三年了，我们是很好的朋友。她是谁？她是我的同学，也是我的好朋友。你呢？你有女朋友吗？你的好朋友是谁？',py:'Wǒ shì Zhōngguó rén. Tā shì shéi? Tā shì wǒ de nǚpéngyou. Tā jiào Xiǎoměi, tā shì Zhōngguó rén. Tā jīnnián shíjiǔ suì. Tā hěn piàoliang, yě hěn cōngmíng. Tā zài dàxué xuéxí Hànyǔ. Tā xǐhuan kàn shū hé tīng yīnyuè. Wǒ rènshi tā sān nián le, wǒmen shì hěn hǎo de péngyou. Tā shì shéi? Tā shì wǒ de tóngxué, yě shì wǒ de hǎo péngyou. Nǐ ne? Nǐ yǒu nǚpéngyou ma? Nǐ de hǎo péngyou shì shéi?',vi:'Tôi là người Trung Quốc. Cô ấy là ai? Cô ấy là bạn gái của tôi. Cô ấy tên Tiểu Mỹ, cô ấy là người Trung Quốc. Cô ấy năm nay 19 tuổi. Cô ấy rất đẹp, cũng rất thông minh. Cô ấy học tiếng Trung ở đại học. Cô ấy thích đọc sách và nghe nhạc. Tôi quen cô ấy 3 năm rồi, chúng tôi là bạn rất tốt. Cô ấy là ai? Cô ấy là bạn cùng lớp, cũng là bạn tốt của tôi. Còn bạn? Bạn có bạn gái không? Bạn tốt của bạn là ai?'},
    {id:4,zh:'我有两个孩子，一个儿子和一个女儿。儿子叫大明，他今年十岁，他喜欢踢足球。女儿叫小花，她今年七岁，她喜欢画画儿。他们都很好，我很爱他们。我每天送他们去学校。他们学习很努力。晚上我们一起吃饭，然后看电视或者看书。周末我们去公园玩，他们很高兴。你喜欢孩子吗？你有几个孩子？',py:'Wǒ yǒu liǎng ge háizi, yí ge érzi hé yí ge nǚ\'ér. Érzi jiào Dàmíng, tā jīnnián shí suì, tā xǐhuan tī zúqiú. Nǚ\'ér jiào Xiǎohuā, tā jīnnián qī suì, tā xǐhuan huà huàr. Tāmen dōu hěn hǎo, wǒ hěn ài tāmen. Wǒ měitiān sòng tāmen qù xuéxiào. Tāmen xuéxí hěn nǔlì. Wǎnshang wǒmen yìqǐ chīfàn, ránhòu kàn diànshì huòzhě kàn shū. Zhōumò wǒmen qù gōngyuán wán, tāmen hěn gāoxìng. Nǐ xǐhuan háizi ma? Nǐ yǒu jǐ ge háizi?',vi:'Tôi có hai đứa con, một trai một gái. Con trai tên Đại Minh, cháu năm nay 10 tuổi, cháu thích đá bóng. Con gái tên Tiểu Hoa, cháu năm nay 7 tuổi, cháu thích vẽ tranh. Các cháu đều rất ngoan, tôi rất yêu chúng. Mỗi ngày tôi đưa chúng đến trường. Chúng học rất chăm chỉ. Buổi tối chúng tôi cùng ăn cơm, rồi xem TV hoặc đọc sách. Cuối tuần chúng tôi đi công viên chơi, chúng rất vui. Bạn có thích trẻ con không? Bạn có mấy đứa con?'},
    {id:5,zh:'今天我休息。我喜欢吃面条儿和饺子。早上我吃了两个包子和一杯牛奶。中午我和朋友去饭馆吃饭。我们吃了米饭、鱼和青菜。鱼很好吃，青菜也很新鲜。我们还喝了一点儿茶。下午我去超市买水果。苹果五块钱一斤，很便宜。我还买了香蕉和葡萄。晚上我在家做饭，我做了面条儿和饺子。你吃饭了吗？你喜欢吃什么？',py:'Jīntiān wǒ xiūxi. Wǒ xǐhuan chī miàntiáor hé jiǎozi. Zǎoshang wǒ chī le liǎng ge bāozi hé yì bēi niúnǎi. Zhōngwǔ wǒ hé péngyou qù fànguǎn chīfàn. Wǒmen chī le mǐfàn, yú hé qīngcài. Yú hěn hǎochī, qīngcài yě hěn xīnxiān. Wǒmen hái hē le yìdiǎnr chá. Xiàwǔ wǒ qù chāoshì mǎi shuǐguǒ. Píngguǒ wǔ kuài qián yì jīn, hěn piányi. Wǒ hái mǎi le xiāngjiāo hé pútao. Wǎnshang wǒ zài jiā zuòfàn, wǒ zuò le miàntiáor hé jiǎozi. Nǐ chīfàn le ma? Nǐ xǐhuan chī shénme?',vi:'Hôm nay tôi nghỉ. Tôi thích ăn mì và sủi cảo. Buổi sáng tôi ăn 2 cái bánh bao và 1 cốc sữa. Buổi trưa tôi cùng bạn đi nhà hàng ăn cơm. Chúng tôi ăn cơm, cá và rau xanh. Cá rất ngon, rau cũng rất tươi. Chúng tôi còn uống một ít trà. Chiều tôi đi siêu thị mua hoa quả. Táo 5 tệ một cân, rất rẻ. Tôi còn mua chuối và nho. Tối tôi ở nhà nấu ăn, tôi làm mì và sủi cảo. Bạn ăn cơm chưa? Bạn thích ăn gì?'},
    {id:6,zh:'你的手机号是多少？我想去超市买东西。我的手机号是一三八零零零零。你有手机吗？我的手机是白色的，很好看。我用手机打电话、发短信，还上网看新闻。超市离我家不远，我走路十分钟就到了。超市很大，里面有很多东西。我要买水果、蔬菜和面包。对了，我还要买牛奶和鸡蛋。你想跟我一起去超市吗？我们可以在那儿见面。',py:'Nǐ de shǒujī hào shì duōshao? Wǒ xiǎng qù chāoshì mǎi dōngxi. Wǒ de shǒujī hào shì yāo sān bā líng líng líng líng. Nǐ yǒu shǒujī ma? Wǒ de shǒujī shì báisè de, hěn hǎokàn. Wǒ yòng shǒujī dǎ diànhuà, fā duǎnxìn, hái shàngwǎng kàn xīnwén. Chāoshì lí wǒ jiā bù yuǎn, wǒ zǒulù shí fēnzhōng jiù dào le. Chāoshì hěn dà, lǐmiàn yǒu hěn duō dōngxi. Wǒ yào mǎi shuǐguǒ, shūcài hé miànbāo. Duì le, wǒ hái yào mǎi niúnǎi hé jīdàn. Nǐ xiǎng gēn wǒ yìqǐ qù chāoshì ma? Wǒmen kěyǐ zài nàr jiànmiàn.',vi:'Số điện thoại của bạn là bao nhiêu? Tôi muốn đi siêu thị mua đồ. Số của tôi là 1380000. Bạn có điện thoại không? Điện thoại của tôi màu trắng, rất đẹp. Tôi dùng điện thoại gọi điện, nhắn tin, và lên mạng xem tin tức. Siêu thị cách nhà tôi không xa, tôi đi bộ 10 phút là đến. Siêu thị rất to, bên trong có rất nhiều đồ. Tôi muốn mua hoa quả, rau và bánh mì. À đúng rồi, tôi còn muốn mua sữa và trứng. Bạn có muốn đi siêu thị cùng tôi không? Chúng ta có thể gặp ở đó.'},
    {id:7,zh:'我晚上六点半下班。现在几点？我们去看电影吧！现在七点一刻，还早呢。我们看什么电影？有一部新电影很好看，是爱情片。电影几点开始？电影八点开始。我们可以先吃饭，然后去看电影。你想去哪儿吃饭？学校旁边有一家中国饭馆，很好吃。好，我请客。你太好了，谢谢你！电影票多少钱一张？五十块钱。我们买两张吧。',py:'Wǒ wǎnshang liù diǎn bàn xiàbān. Xiànzài jǐ diǎn? Wǒmen qù kàn diànyǐng ba! Xiànzài qī diǎn yí kè, hái zǎo ne. Wǒmen kàn shénme diànyǐng? Yǒu yí bù xīn diànyǐng hěn hǎokàn, shì àiqíng piàn. Diànyǐng jǐ diǎn kāishǐ? Diànyǐng bā diǎn kāishǐ. Wǒmen kěyǐ xiān chīfàn, ránhòu qù kàn diànyǐng. Nǐ xiǎng qù nǎr chīfàn? Xuéxiào pángbiān yǒu yì jiā Zhōngguó fànguǎn, hěn hǎochī. Hǎo, wǒ qǐngkè. Nǐ tài hǎo le, xièxie nǐ! Diànyǐng piào duōshao qián yì zhāng? Wǔshí kuài qián. Wǒmen mǎi liǎng zhāng ba.',vi:'Tối tôi 6 giờ rưỡi tan làm. Bây giờ mấy giờ? Chúng ta đi xem phim đi! Bây giờ 7:15, còn sớm. Chúng ta xem phim gì? Có một bộ phim mới rất hay, là phim tình cảm. Phim mấy giờ bắt đầu? Phim 8 giờ bắt đầu. Chúng ta có thể ăn cơm trước, rồi đi xem phim. Bạn muốn đi đâu ăn? Cạnh trường có một nhà hàng Trung Quốc, rất ngon. Được, tôi mời. Bạn tốt quá, cảm ơn bạn! Vé xem phim bao nhiêu tiền một vé? 50 tệ. Chúng ta mua 2 vé nhé.'},
    {id:8,zh:'我爸爸也在医院工作。他是医生，我妈妈是老师。我爸爸今年五十岁，他工作很忙。每天早上他七点就去医院。他有很多病人，他对病人很好。我妈妈四十八岁，她在小学教书。她教汉语，学生们很喜欢她。我还有一个妹妹，她在读高中。她学习很努力，想要考上好大学。我们家有四口人，我们都很爱彼此。周末我们常常一起吃饭，聊天，看电视。你的家人做什么工作？',py:'Wǒ bàba yě zài yīyuàn gōngzuò. Tā shì yīshēng, wǒ māma shì lǎoshī. Wǒ bàba jīnnián wǔshí suì, tā gōngzuò hěn máng. Měitiān zǎoshang tā qī diǎn jiù qù yīyuàn. Tā yǒu hěn duō bìngrén, tā duì bìngrén hěn hǎo. Wǒ māma sìshíbā suì, tā zài xiǎoxué jiāoshū. Tā jiāo Hànyǔ, xuéshēngmen hěn xǐhuan tā. Wǒ hái yǒu yí ge mèimei, tā zài dú gāozhōng. Tā xuéxí hěn nǔlì, xiǎng yào kǎoshang hǎo dàxué. Wǒmen jiā yǒu sì kǒu rén, wǒmen dōu hěn ài bǐcǐ. Zhōumò wǒmen chángcháng yìqǐ chīfàn, liáotiān, kàn diànshì. Nǐ de jiārén zuò shénme gōngzuò?',vi:'Bố tôi cũng làm ở bệnh viện. Ông là bác sĩ, mẹ tôi là giáo viên. Bố tôi năm nay 50 tuổi, ông làm việc rất bận. Mỗi sáng 7 giờ ông đã đi bệnh viện. Ông có rất nhiều bệnh nhân, ông đối xử với bệnh nhân rất tốt. Mẹ tôi 48 tuổi, bà dạy ở trường tiểu học. Bà dạy tiếng Trung, học sinh rất thích bà. Tôi còn có một em gái, em ấy đang học cấp 3. Em ấy học rất chăm, muốn thi đỗ đại học tốt. Nhà tôi có 4 người, chúng tôi đều rất yêu thương nhau. Cuối tuần chúng tôi thường cùng nhau ăn cơm, trò chuyện, xem TV. Gia đình bạn làm nghề gì?'},
    {id:9,zh:'我明天上午在学校学习。下午我去书店看书。早上八点我有汉语课，老师教我们新课文。我们学习很多生词和语法。十点钟下课，我和同学去操场跑步。中午在食堂吃饭，我吃了米饭和鸡肉。下午三点我去书店，书店很大很安静。我喜欢看小说和故事书，有时候也看学习书。我在书店看了两个小时的书。然后买了一本词典，花了一百块钱。晚上我回家复习功课，写作业。你看过什么好书？你喜欢去书店吗？',py:'Wǒ míngtiān shàngwǔ zài xuéxiào xuéxí. Xiàwǔ wǒ qù shūdiàn kàn shū. Zǎoshang bā diǎn wǒ yǒu Hànyǔ kè, lǎoshī jiāo wǒmen xīn kèwén. Wǒmen xuéxí hěn duō shēngcí hé yǔfǎ. Shí diǎn zhōng xiàkè, wǒ hé tóngxué qù cāochǎng pǎobù. Zhōngwǔ zài shítáng chīfàn, wǒ chī le mǐfàn hé jīròu. Xiàwǔ sān diǎn wǒ qù shūdiàn, shūdiàn hěn dà hěn ānjìng. Wǒ xǐhuan kàn xiǎoshuō hé gùshi shū, yǒu shíhou yě kàn xuéxí shū. Wǒ zài shūdiàn kàn le liǎng ge xiǎoshí de shū. Ránhòu mǎi le yì běn cídiǎn, huā le yìbǎi kuài qián. Wǎnshang wǒ huíjiā fùxí gōngkè, xiě zuòyè. Nǐ kànguo shénme hǎo shū? Nǐ xǐhuan qù shūdiàn ma?',vi:'Sáng mai tôi học ở trường. Chiều tôi đi hiệu sách đọc sách. 8 giờ sáng tôi có tiết tiếng Trung, thầy dạy chúng tôi bài mới. Chúng tôi học rất nhiều từ mới và ngữ pháp. 10 giờ tan học, tôi và bạn cùng lớp ra sân chạy bộ. Buổi trưa ăn ở nhà ăn, tôi ăn cơm và thịt gà. 3 giờ chiều tôi đi hiệu sách, hiệu sách rất to và yên tĩnh. Tôi thích đọc tiểu thuyết và truyện, thỉnh thoảng cũng xem sách học. Tôi ở hiệu sách đọc sách 2 tiếng. Sau đó mua một quyển từ điển, hết 100 tệ. Buổi tối tôi về nhà ôn bài, làm bài tập. Bạn đã đọc quyển sách hay nào chưa? Bạn có thích đi hiệu sách không?'},
    {id:10,zh:'这儿的苹果真便宜！多少钱一斤？太贵了！苹果五块钱一斤，香蕉三块五一斤。我要两斤苹果和一斤香蕉。一共多少钱？苹果十块，香蕉三块五，一共十三块五。给你二十块。找你六块五。你还要别的吗？我再要一斤葡萄。葡萄多少钱一斤？葡萄十五块钱一斤。太贵了！不要葡萄了。西瓜呢？西瓜两块五一斤。好，来一个西瓜，要小的。你买了好多东西啊！是啊，家里没有水果了。',py:'Zhèr de píngguǒ zhēn piányi! Duōshao qián yì jīn? Tài guì le! Píngguǒ wǔ kuài qián yì jīn, xiāngjiāo sān kuài wǔ yì jīn. Wǒ yào liǎng jīn píngguǒ hé yì jīn xiāngjiāo. Yígòng duōshao qián? Píngguǒ shí kuài, xiāngjiāo sān kuài wǔ, yígòng shísān kuài wǔ. Gěi nǐ èrshí kuài. Zhǎo nǐ liù kuài wǔ. Nǐ hái yào bié de ma? Wǒ zài yào yì jīn pútao. Pútao duōshao qián yì jīn? Pútao shíwǔ kuài qián yì jīn. Tài guì le! Bú yào pútao le. Xīguā ne? Xīguā liǎng kuài wǔ yì jīn. Hǎo, lái yí ge xīguā, yào xiǎo de. Nǐ mǎi le hǎo duō dōngxi a! Shì a, jiā lǐ méiyǒu shuǐguǒ le.',vi:'Táo ở đây rẻ thật! Bao nhiêu tiền một cân? Đắt quá! Táo 5 tệ một cân, chuối 3.5 tệ một cân. Tôi muốn 2 cân táo và 1 cân chuối. Tổng cộng bao nhiêu? Táo 10 tệ, chuối 3.5 tệ, tổng 13.5 tệ. Gửi bạn 20 tệ. Trả lại bạn 6.5 tệ. Bạn còn muốn gì nữa không? Tôi muốn thêm 1 cân nho. Nho bao nhiêu tiền 1 cân? Nho 15 tệ 1 cân. Đắt quá! Không lấy nho nữa. Thế dưa hấu thì sao? Dưa hấu 2.5 tệ 1 cân. Được, lấy một quả dưa hấu, quả nhỏ thôi. Bạn mua nhiều đồ thế! Ừ, nhà hết hoa quả rồi.'},
    {id:11,zh:'我读大学呢。你学什么？我会说一点儿汉语。我在北京大学学习中文，这是我的专业。除了中文，我还学习英语和计算机。学习很忙，但是很有意思。我每天都有课，有时候晚上也要上课。我会说一点儿汉语，但是说得不太好。我的听力和阅读还可以，写汉字比较难。你呢？你学什么？你是在校学生还是已经工作了？我想找一个中国朋友练习说汉语。你能帮我吗？我们一起学习吧！',py:'Wǒ dú dàxué ne. Nǐ xué shénme? Wǒ huì shuō yìdiǎnr Hànyǔ. Wǒ zài Běijīng Dàxué xuéxí Zhōngwén, zhè shì wǒ de zhuānyè. Chúle Zhōngwén, wǒ hái xuéxí Yīngyǔ hé jìsuànjī. Xuéxí hěn máng, dànshì hěn yǒu yìsi. Wǒ měitiān dōu yǒu kè, yǒu shíhou wǎnshang yě yào shàngkè. Wǒ huì shuō yìdiǎnr Hànyǔ, dànshì shuō de bú tài hǎo. Wǒ de tīnglì hé yuèdú hái kěyǐ, xiě Hànzì bǐjiào nán. Nǐ ne? Nǐ xué shénme? Nǐ shì zài xiào xuéshēng háishì yǐjīng gōngzuò le? Wǒ xiǎng zhǎo yí ge Zhōngguó péngyou liànxí shuō Hànyǔ. Nǐ néng bāng wǒ ma? Wǒmen yìqǐ xuéxí ba!',vi:'Tôi đang học đại học. Bạn học gì? Tôi biết nói một chút tiếng Trung. Tôi học tiếng Trung ở Đại học Bắc Kinh, đây là chuyên ngành của tôi. Ngoài tiếng Trung, tôi còn học tiếng Anh và máy tính. Học rất bận, nhưng rất thú vị. Mỗi ngày tôi đều có tiết, có lúc buổi tối cũng phải lên lớp. Tôi biết nói một chút tiếng Trung, nhưng nói chưa tốt lắm. Nghe và đọc của tôi còn được, viết chữ Hán thì khó hơn. Còn bạn? Bạn học gì? Bạn là sinh viên hay đã đi làm rồi? Tôi muốn tìm một người bạn Trung Quốc để luyện nói. Bạn có thể giúp tôi không? Chúng ta cùng học nhé!'},
    {id:12,zh:'昨天下雪了，天气很冷。今天下雨了，我不太舒服。北京的冬天很冷，经常下雪。昨天下了一场大雪，地上都是白的，很好看。但是天气太冷了，我都不想出门。今天早上起来，我觉得头疼、嗓子疼，好像感冒了。妈妈给我量体温，三十八度，发烧了。她叫我去医院看医生。医生给我开了药，叫我多喝水，好好休息。现在的天气真不好，一会儿冷一会儿热。你要注意身体，多穿衣服，别感冒了！',py:'Zuótiān xià xuě le, tiānqì hěn lěng. Jīntiān xià yǔ le, wǒ bú tài shūfu. Běijīng de dōngtiān hěn lěng, jīngcháng xià xuě. Zuótiān xià le yì chǎng dà xuě, dì shang dōu shì bái de, hěn hǎokàn. Dànshì tiānqì tài lěng le, wǒ dōu bù xiǎng chūmén. Jīntiān zǎoshang qǐlái, wǒ juéde tóuténg, sǎngzi téng, hǎoxiàng gǎnmào le. Māma gěi wǒ liáng tǐwēn, sānshíbā dù, fāshāo le. Tā jiào wǒ qù yīyuàn kàn yīshēng. Yīshēng gěi wǒ kāi le yào, jiào wǒ duō hē shuǐ, hǎohǎo xiūxi. Xiànzài de tiānqì zhēn bù hǎo, yíhuìr lěng yíhuìr rè. Nǐ yào zhùyì shēntǐ, duō chuān yīfu, bié gǎnmào le!',vi:'Hôm qua có tuyết rơi, thời tiết rất lạnh. Hôm nay mưa, tôi không được khỏe. Mùa đông ở Bắc Kinh rất lạnh, thường xuyên có tuyết. Hôm qua tuyết rơi một trận lớn, mặt đất trắng xóa, rất đẹp. Nhưng thời tiết lạnh quá, tôi không muốn ra ngoài. Sáng nay thức dậy, tôi thấy đau đầu, đau họng, hình như bị cảm rồi. Mẹ đo nhiệt độ cho tôi, 38 độ, sốt rồi. Bà bảo tôi đi bệnh viện khám. Bác sĩ kê thuốc cho tôi, dặn uống nhiều nước, nghỉ ngơi cho tốt. Thời tiết bây giờ thật tệ, lúc lạnh lúc nóng. Bạn phải chú ý sức khỏe, mặc nhiều áo, đừng để cảm nhé!'},
    {id:13,zh:'请给我一杯茶。可以吗？谢谢！不客气。服务员，我要一杯绿茶，不加糖。好的，马上来。你的茶来了，请慢用。谢谢你！这茶多少钱？十五块钱一杯。好的，给你钱。你还要别的吗？我还想要一杯咖啡。你要热的还是冷的？热的吧，不加糖。一共多少钱？茶十五块，咖啡二十块，一共三十五块。给你五十。找你十五，谢谢光临！这家店的茶真好喝，下次我还来。',py:'Qǐng gěi wǒ yì bēi chá. Kěyǐ ma? Xièxie! Bú kèqi. Fúwùyuán, wǒ yào yì bēi lǜchá, bù jiā táng. Hǎo de, mǎshàng lái. Nǐ de chá lái le, qǐng màn yòng. Xièxie nǐ! Zhè chá duōshao qián? Shíwǔ kuài qián yì bēi. Hǎo de, gěi nǐ qián. Nǐ hái yào bié de ma? Wǒ hái xiǎng yào yì bēi kāfēi. Nǐ yào rè de háishì lěng de? Rè de ba, bù jiā táng. Yígòng duōshao qián? Chá shíwǔ kuài, kāfēi èrshí kuài, yígòng sānshíwǔ kuài. Gěi nǐ wǔshí. Zhǎo nǐ shíwǔ, xièxie guānglín! Zhè jiā diàn de chá zhēn hǎohē, xià cì wǒ hái lái.',vi:'Cho tôi một tách trà. Được không? Cảm ơn! Không có gì. Phục vụ ơi, tôi muốn một tách trà xanh, không đường. Vâng, đến ngay. Trà của bạn đây, xin từ từ dùng. Cảm ơn bạn! Trà này bao nhiêu tiền? 15 tệ một tách. Được, gửi bạn tiền. Bạn còn muốn gì nữa không? Tôi còn muốn một cốc cà phê. Bạn muốn nóng hay lạnh? Nóng đi, không đường. Tổng cộng bao nhiêu? Trà 15 tệ, cà phê 20 tệ, tổng 35 tệ. Gửi bạn 50. Trả lại bạn 15, cảm ơn đã ghé! Trà ở quán này ngon thật, lần sau tôi lại đến.'},
    {id:14,zh:'我看了一个电影。他们都来了。不要说话！昨天我和朋友们去看了一部新电影，是一部动作片。电影很好看，很刺激、很精彩。我们买了票和爆米花，坐在第五排。电影院里人很多，差不多都坐满了。电影开始了，大家都安静了。可是有一个人在打电话，声音很大。我旁边的朋友说：不要说话！请安静！那个人听了以后说了声对不起，关掉了手机。看完电影，大家都说这部电影很不错。我们决定下次再一起来看电影。你喜欢看什么电影？',py:'Wǒ kàn le yí ge diànyǐng. Tāmen dōu lái le. Búyào shuōhuà! Zuótiān wǒ hé péngyoumen qù kàn le yí bù xīn diànyǐng, shì yí bù dòngzuò piàn. Diànyǐng hěn hǎokàn, hěn cìjī, hěn jīngcǎi. Wǒmen mǎi le piào hé bàomǐhuā, zuò zài dì wǔ pái. Diànyǐngyuàn lǐ rén hěn duō, chàbuduō dōu zuòmǎn le. Diànyǐng kāishǐ le, dàjiā dōu ānjìng le. Kěshì yǒu yí ge rén zài dǎ diànhuà, shēngyīn hěn dà. Wǒ pángbiān de péngyou shuō: búyào shuōhuà! Qǐng ānjìng! Nàge rén tīng le yǐhòu shuō le shēng duìbuqǐ, guāndiào le shǒujī. Kànwán diànyǐng, dàjiā dōu shuō zhè bù diànyǐng hěn búcuò. Wǒmen juédìng xià cì zài yìqǐ lái kàn diànyǐng. Nǐ xǐhuan kàn shénme diànyǐng?',vi:'Tôi đã xem một bộ phim. Họ đều đến rồi. Đừng nói chuyện! Hôm qua tôi và các bạn đi xem một bộ phim mới, là phim hành động. Phim rất hay, rất kịch tính, rất hấp dẫn. Chúng tôi mua vé và bỏng ngô, ngồi ở hàng thứ 5. Trong rạp rất đông người, gần như kín chỗ. Phim bắt đầu, mọi người đều yên lặng. Nhưng có một người đang gọi điện thoại, tiếng rất to. Bạn tôi ngồi cạnh nói: Đừng nói chuyện! Xin giữ yên lặng! Người đó nghe xong nói tiếng xin lỗi, tắt điện thoại. Xem xong phim, mọi người đều nói bộ phim này rất hay. Chúng tôi quyết định lần sau lại cùng đi xem phim. Bạn thích xem phim gì?'},
    {id:15,zh:'我想再去一次中国。你爱你的家人吗？我很爱他们。我去过中国两次了，第一次去北京，第二次去上海。中国很大，每个城市都不一样。北京的名胜古迹很多，长城、故宫都很美。上海的楼很高，晚上灯光很好看。我还想去中国的西安、成都和广州看看。中国的美食也很多，我最喜欢吃北京烤鸭和四川火锅。我想带我的家人一起去中国旅行。他们一定会喜欢中国的！你爱你的家人吗？我很爱我的家人，他们是我最重要的人。',py:'Wǒ xiǎng zài qù yí cì Zhōngguó. Nǐ ài nǐ de jiārén ma? Wǒ hěn ài tāmen. Wǒ qùguo Zhōngguó liǎng cì le, dì yī cì qù Běijīng, dì èr cì qù Shànghǎi. Zhōngguó hěn dà, měi ge chéngshì dōu bù yíyàng. Běijīng de míngshèng gǔjī hěn duō, Chángchéng, Gùgōng dōu hěn měi. Shànghǎi de lóu hěn gāo, wǎnshang dēngguāng hěn hǎokàn. Wǒ hái xiǎng qù Zhōngguó de Xī\'ān, Chéngdū hé Guǎngzhōu kànkan. Zhōngguó de měishí yě hěn duō, wǒ zuì xǐhuan chī Běijīng kǎoyā hé Sìchuān huǒguō. Wǒ xiǎng dài wǒ de jiārén yìqǐ qù Zhōngguó lǚxíng. Tāmen yídìng huì xǐhuan Zhōngguó de! Nǐ ài nǐ de jiārén ma? Wǒ hěn ài wǒ de jiārén, tāmen shì wǒ zuì zhòngyào de rén.',vi:'Tôi muốn đi Trung Quốc thêm lần nữa. Bạn có yêu gia đình không? Tôi rất yêu họ. Tôi từng đi Trung Quốc 2 lần, lần 1 đi Bắc Kinh, lần 2 đi Thượng Hải. Trung Quốc rất rộng, mỗi thành phố đều khác nhau. Danh lam thắng cảnh ở Bắc Kinh rất nhiều, Vạn Lý Trường Thành, Cố Cung đều rất đẹp. Nhà ở Thượng Hải rất cao, buổi tối đèn rất đẹp. Tôi còn muốn đi Tây An, Thành Đô và Quảng Châu xem thử. Ẩm thực Trung Quốc cũng rất phong phú, tôi thích nhất là vịt quay Bắc Kinh và lẩu Tứ Xuyên. Tôi muốn đưa gia đình cùng đi Trung Quốc du lịch. Họ nhất định sẽ thích Trung Quốc! Bạn có yêu gia đình bạn không? Tôi rất yêu gia đình tôi, họ là những người quan trọng nhất đối với tôi.'},
  ],

function scoreReading(original, recognized){
  try{
    var normOrig=normalizeChinese(original);
    var normRec=normalizeChinese(recognized);
    var o=[...normOrig], r=[...normRec];
    var chars=[], ri=0, correct=0;
    for(var i=0;i<o.length;i++){
      var matched=false;
      if(ri<r.length&&o[i]===r[ri]){matched=true;ri++}
      else{for(var j=ri;j<Math.min(ri+4,r.length);j++){if(o[i]===r[j]){matched=true;ri=j+1;break}}}
      chars.push({char:o[i],match:matched});if(matched)correct++;
    }
    return{chars:chars,score:o.length?Math.round(correct/o.length*100):0,total:o.length,correct:correct,recognized:recognized};
  }catch(e){console.error('scoreReading error:',e);return{chars:[],score:0,total:0,correct:0,recognized:recognized}}
}

  var pool=(typeof HSK1_ALL!=='undefined'?HSK1_ALL:[]).concat(typeof HSK2_ALL!=='undefined'?HSK2_ALL:[]).concat(typeof HSK3_ALL!=='undefined'?HSK3_ALL:[]);
  var found=pool.find(function(x){return x.hanzi===w.hanzi||x.h===w.hanzi});
  if(found){w.hv=found.hv||'';w.ex=found.ex||''}
  return w;
}

function attachEvents(){
  console.log('[ATTACH] events attaching, modeCards='+document.querySelectorAll('.rv-mode-card').length);
  // ═══ REVIEW MODE CARDS — via event delegation on main ═══
  var main=document.querySelector('.main');
  if(main&&!main._hasReviewDelegation){
    main._hasReviewDelegation=true;
    main.addEventListener('click',function(e){
      var card=e.target.closest('.rv-mode-card');
      if(!card)return;
      e.stopPropagation();
      var mode=card.dataset.mode;
      console.log('[REVIEW-CLICK] mode='+mode);
      state._reviewLevel=state._reviewLevel||'hsk1';state._reviewMode=mode;state.quizDone=false;
      var rvPool=state._reviewLevel==='hsk1'?HSK1_ALL:state._reviewLevel==='hsk2'?HSK2_ALL:HSK3_ALL;
      if(!rvPool||!rvPool.length)rvPool=HSK1_ALL||[];
      var rvWords=shuffle(rvPool.map(enrichWord)).slice(0,20);
      state.fcShuffled=rvWords;state.fcIndex=0;state.fcFlipped=false;
      if(mode==='writing'){state.mode='writing';state.writingData=null;state.writingUserInputs={};state.writingSubmitted=false;state.writingLoading=false;state.writingError=null;state.writingAiFeedback=null}
      else if(mode!=='flashcard')generateSRQuiz(rvWords,mode);else state.quizQuestions=[];
      render();
    });
  }
  // Bottom nav tabs
  document.querySelectorAll('[data-tab]').forEach(function(b){
    b.onclick=function(){
      state.tab=b.dataset.tab;
      if (state.tab==='learn' && state.view==='') state.view='home';
      render();
      window.scrollTo({top:0,behavior:'smooth'});
    };
  });
  // Locked level cards → trigger login or VIP upgrade
  document.querySelectorAll('.level-card.locked').forEach(function(c){
    var action = c.dataset.lockAction;
    c.onclick=function(){
      if(action==='login') sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin}});
      else alert('Tính năng này dành cho tài khoản VIP. Vui lòng nâng cấp!');
    };
  });
  // Dictionary search
  var ds=document.querySelector('[data-dict-search]');
  if(ds){ds.oninput=function(){state.dictSearch=this.value;render()};ds.focus()}
  // Dictionary expand groups
  document.querySelectorAll('[data-dict-expand]').forEach(function(b){
    b.onclick=function(){state._dictExpanded=state._dictExpanded===b.dataset.dictExpand?null:b.dataset.dictExpand;render()};
  });
  // Dictionary subtabs
  document.querySelectorAll('[data-dict-sub]').forEach(function(b){
    b.onclick=function(){state.dictSubtopic=b.dataset.dictSub;render()};
  });
  // Dictionary add-to-review buttons
  document.querySelectorAll('[data-dict-add]').forEach(function(b){
    b.onclick=function(e){e.stopPropagation();alert('Đã thêm "'+b.dataset.dictAdd+'" vào danh sách ôn tập! (tính năng đang phát triển)')};
  });
  // Review start button
  document.querySelectorAll('[data-action="review-start"]').forEach(function(b){
    b.onclick=function(){
      if (!state._reviewPool || !state._reviewPool.length) { alert('Không có từ nào để ôn tập!'); return; }

  document.querySelectorAll('[data-quiz-opt]').forEach(b=>{b.onclick=()=>{if(state.quizAnswered)return;const i=parseInt(b.dataset.quizOpt);const q=state.quizQuestions[state.quizIndex];q.sel=i;state.quizAnswered=true;if(i===q.ci)state.quizScore++;render();setTimeout(()=>{if(state.quizIndex<state.quizQuestions.length-1){state.quizIndex++;state.quizAnswered=false;render()}else{state.quizDone=true;render()}},1200)}});
}

document.addEventListener('keydown',function(e){
  if(state.mode==='flashcard'||(state.view==='review'&&state.rMode==='flashcard')||(state.view==='review2'&&state.rMode==='flashcard')||(state.view==='review3'&&state.rMode==='flashcard')||(state.view==='grammar'&&state.mode==='flashcard')||(state.view==='hsk79set'&&state.mode==='flashcard')||(state.view==='hsk456set'&&state.mode==='flashcard')){
    if(e.code==='Space'||e.code==='ArrowUp'||e.code==='ArrowDown'){e.preventDefault();state.fcFlipped=!state.fcFlipped;render()}
    if(e.code==='ArrowRight'){e.preventDefault();if(state.fcIndex<state.fcShuffled.length-1){state.fcIndex++;state.fcFlipped=false;render()}}
    if(e.code==='ArrowLeft'){e.preventDefault();if(state.fcIndex>0){state.fcIndex--;state.fcFlipped=false;render()}}
    if(e.code==='KeyS'||e.code==='KeyR'){e.preventDefault();if(state.fcShuffled.length)speak(state.fcShuffled[state.fcIndex].hanzi)}
  }
});

document.getElementById('app').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh"><div style="text-align:center;color:var(--c-text-dim)">Đang tải...</div></div>';
sb.auth.onAuthStateChange((event,session)=>{if(session?.user){state.isLoggedIn=true;state.user=session.user;render()}});
sb.auth.getSession().then(({data})=>{if(data.session){state.isLoggedIn=true;state.user=data.session.user;}render();});
